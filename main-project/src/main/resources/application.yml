server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/gaebalfan_erp?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
    encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.gaebalfan.erp.domain
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.gaebalfan.erp: DEBUG
