<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>작업지시 | 개발팬 ERP</title>
    <link rel="stylesheet" th:href="@{/css/erp.css(v=3)}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('work-orders')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>⚙️ 작업지시 관리</h2>
                <p>환풍기 생산 작업지시를 조회하고 관리합니다.</p>
            </div>
            <button onclick="openCreate()" class="btn btn-primary">+ 작업지시 등록</button>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="검색..." oninput="filterTable()" class="search-input">
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>제품명</th>
                        <th>생산 수량</th>
                        <th>시작일</th>
                        <th>상태</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(workOrderList)}">
                        <td colspan="6" class="empty-state">등록된 작업지시가 없습니다.</td>
                    </tr>
                    <tr th:each="w : ${workOrderList}">
                        <td th:text="${w.workOrderId}"></td>
                        <td th:text="${w.productName != null ? w.productName : w.productId}"></td>
                        <td class="qty" th:text="${w.quantity}"></td>
                        <td th:text="${w.startDate}"></td>
                        <td>
                            <span th:if="${w.status == 'PENDING'}"     class="badge badge-pending">대기</span>
                            <span th:if="${w.status == 'IN_PROGRESS'}" class="badge badge-inprogress">진행중</span>
                            <span th:if="${w.status == 'COMPLETED'}"   class="badge badge-completed">완료</span>
                            <span th:if="${w.status == 'CANCELLED'}"   class="badge badge-cancelled">취소</span>
                        </td>
                        <td>
                            <button class="btn-action btn-start"
                                    th:if="${w.status == 'PENDING'}"
                                    th:onclick="|changeStatus(${w.workOrderId}, 'IN_PROGRESS')|">시작</button>
                            <button class="btn-action btn-complete"
                                    th:if="${w.status == 'IN_PROGRESS'}"
                                    th:onclick="|changeStatus(${w.workOrderId}, 'COMPLETED')|">완료</button>
                            <button class="btn-action btn-receive"
                                    th:if="${w.status == 'IN_PROGRESS'}"
                                    th:onclick="|openProdReceipt(${w.workOrderId},${w.productId})|">생산입고</button>
                            <button class="btn-action btn-cancel-w"
                                    th:if="${w.status == 'PENDING' or w.status == 'IN_PROGRESS'}"
                                    th:onclick="|changeStatus(${w.workOrderId}, 'CANCELLED')|">취소</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Hidden product select for JS -->
<select id="productSourceSelect" style="display:none">
    <option value="">제품 선택</option>
    <option th:each="p : ${productList}" th:value="${p.productId}" th:text="${p.productName}"></option>
</select>

<!-- 생산 입고 처리 모달 -->
<div class="modal-overlay" id="prodReceiptModal">
    <div class="modal">
        <h3>생산 입고 처리</h3>
        <input type="hidden" id="prWorkOrderId">
        <input type="hidden" id="prProductId">
        <div class="form-group"><label>수량 *</label><input type="number" id="prQuantity" placeholder="0"></div>
        <div class="form-group">
            <label>입고 창고 *</label>
            <select id="prWarehouseId">
                <option value="">선택</option>
                <option th:each="w : ${warehouseList}" th:value="${w.warehouseId}" th:text="${w.warehouseName}"></option>
            </select>
        </div>
        <div class="form-group"><label>입고일시</label><input type="datetime-local" id="prReceiptDate"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closePrModal()">취소</button>
            <button class="btn-save" onclick="saveProdReceipt()">입고 처리</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>작업지시 등록</h3>
        <div class="form-group"><label>제품 *</label><select id="productId"></select></div>
        <div class="form-group"><label>생산 수량 *</label><input type="number" id="quantity" placeholder="0" min="1"></div>
        <div class="form-group"><label>시작일</label><input type="datetime-local" id="startDate"></div>
        <div class="form-group"><label>상태</label>
            <select id="status">
                <option value="PENDING">대기 (PENDING)</option>
                <option value="IN_PROGRESS">진행중 (IN_PROGRESS)</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="saveWorkOrder()">저장</button>
        </div>
    </div>
</div>

<script>
function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
function openCreate() {
    const src = document.getElementById('productSourceSelect');
    const dst = document.getElementById('productId');
    dst.innerHTML = src.innerHTML;
    document.getElementById('quantity').value = '';
    document.getElementById('startDate').value = '';
    document.getElementById('status').value = 'PENDING';
    document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function saveWorkOrder() {
    const data = {
        productId: document.getElementById('productId').value || null,
        quantity: document.getElementById('quantity').value || null,
        startDate: document.getElementById('startDate').value || null,
        status: document.getElementById('status').value
    };
    const csrf = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    fetch('/api/work-orders', {
        method: 'POST',
        headers: {'Content-Type':'application/json', [csrfHeader]: csrf},
        body: JSON.stringify(data)
    }).then(() => location.reload());
}
function changeStatus(id, status) {
    const csrf = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    fetch('/api/work-orders/' + id + '/status', {
        method: 'PATCH',
        headers: {'Content-Type':'application/json', [csrfHeader]: csrf},
        body: JSON.stringify({status: status})
    }).then(() => location.reload());
}
function openProdReceipt(workOrderId, productId) {
    document.getElementById('prWorkOrderId').value = workOrderId;
    document.getElementById('prProductId').value = productId;
    document.getElementById('prQuantity').value = '';
    document.getElementById('prWarehouseId').value = '';
    document.getElementById('prReceiptDate').value = '';
    document.getElementById('prodReceiptModal').classList.add('open');
}
function closePrModal() { document.getElementById('prodReceiptModal').classList.remove('open'); }
function saveProdReceipt() {
    const csrf = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const data = {
        workOrderId: document.getElementById('prWorkOrderId').value,
        productId: document.getElementById('prProductId').value,
        quantity: document.getElementById('prQuantity').value,
        warehouseId: document.getElementById('prWarehouseId').value,
        receiptDate: document.getElementById('prReceiptDate').value
    };
    fetch('/api/production-receipts', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => location.reload());
}
</script>
</body>
</html>
