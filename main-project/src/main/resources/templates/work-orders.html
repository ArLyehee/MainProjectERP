<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>작업지시 | 개발팬 ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#4f8ef7; --text:#e8eaf0; --text-muted:#6b7280; --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; }
        body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans KR',sans-serif; min-height:100vh; }
        .layout { display:flex; min-height:100vh; }
        :root { --sidebar-w:220px; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto; }
        .sidebar-logo { padding:20px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .sidebar-logo .s-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
        .sidebar-logo .brand { font-size:13px; font-weight:600; line-height:1.3; }
        .sidebar-logo .brand small { display:block; font-size:10px; color:var(--accent); letter-spacing:1px; font-weight:400; }
        .nav-section { padding:14px 12px 5px; font-size:10px; letter-spacing:1.5px; color:var(--text-muted); text-transform:uppercase; }
        .nav-item { display:flex; align-items:center; gap:9px; padding:9px 12px; margin:2px 8px; border-radius:7px; font-size:13px; color:var(--text-muted); text-decoration:none; transition:background .15s,color .15s; }
        .nav-item:hover { background:rgba(79,142,247,.08); color:var(--text); }
        .nav-item.active { background:rgba(79,142,247,.15); color:var(--accent); font-weight:500; }
        .ni { font-size:15px; width:20px; text-align:center; }
        .sidebar-bottom { margin-top:auto; padding:14px; border-top:1px solid var(--border); }
        .user-info { display:flex; align-items:center; gap:9px; padding:8px; border-radius:7px; }
        .avatar { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; color:#fff; }
        .user-meta { flex:1; min-width:0; }
        .uname { font-size:12px; font-weight:500; }
        .urole { font-size:10px; color:var(--accent); letter-spacing:.5px; }
        .btn-logout { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px; padding:3px; border-radius:4px; transition:color .15s; }
        .btn-logout:hover { color:#ef4444; }
        .main { flex:1; padding:32px; overflow-x:auto; margin-left:var(--sidebar-w); }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
        .page-title h2 { font-size:20px; font-weight:600; }
        .page-title p { font-size:13px; color:var(--text-muted); margin-top:4px; }
        .btn { padding:9px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#3b7de8; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { padding:12px 16px; text-align:left; font-size:11px; font-weight:500; color:var(--text-muted); letter-spacing:.8px; text-transform:uppercase; border-bottom:1px solid var(--border); background:rgba(0,0,0,.2); }
        td { padding:13px 16px; border-bottom:1px solid rgba(42,45,58,.5); color:var(--text); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(79,142,247,.04); }
        .badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; }
        .badge-pending     { background:rgba(245,158,11,.15); color:#fbbf24; }
        .badge-inprogress  { background:rgba(79,142,247,.15); color:#93c5fd; }
        .badge-completed   { background:rgba(34,197,94,.15); color:#4ade80; }
        .badge-cancelled   { background:rgba(239,68,68,.15); color:#f87171; }
        .qty { font-weight:600; }
        .empty-state { text-align:center; padding:60px; color:var(--text-muted); }
        .btn-action { padding:4px 10px; border-radius:5px; border:none; cursor:pointer; font-size:12px; font-family:inherit; margin-left:2px; }
        .btn-start    { background:rgba(79,142,247,.15); color:#4f8ef7; }
        .btn-start:hover { background:rgba(79,142,247,.3); }
        .btn-complete { background:rgba(34,197,94,.15); color:#4ade80; }
        .btn-complete:hover { background:rgba(34,197,94,.3); }
        .btn-cancel-w { background:rgba(239,68,68,.15); color:#ef4444; }
        .btn-cancel-w:hover { background:rgba(239,68,68,.3); }
        .btn-receive { background:rgba(34,197,94,.15); color:#22c55e; }
        .btn-receive:hover { background:rgba(34,197,94,.3); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:#1a1d27; border:1px solid #2a2d3a; border-radius:12px; padding:28px; width:420px; max-width:95vw; }
        .modal h3 { font-size:16px; font-weight:600; margin-bottom:20px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:12px; color:#6b7280; margin-bottom:6px; }
        .form-group input, .form-group textarea, .form-group select { width:100%; padding:9px 12px; background:#0f1117; border:1px solid #2a2d3a; border-radius:7px; color:#e8eaf0; font-size:13px; font-family:inherit; outline:none; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:#4f8ef7; }
        .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
        .btn-cancel { padding:8px 16px; border-radius:7px; border:1px solid #2a2d3a; background:transparent; color:#6b7280; cursor:pointer; font-size:13px; font-family:inherit; }
        .btn-cancel:hover { color:#e8eaf0; }
        .btn-save { padding:8px 16px; border-radius:7px; border:none; background:#4f8ef7; color:#fff; cursor:pointer; font-size:13px; font-family:inherit; font-weight:500; }
        .btn-save:hover { background:#3b7de8; }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('work-orders')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>⚙️ 작업지시 관리</h2>
                <p>환풍기 생산 작업지시를 조회하고 관리합니다.</p>
            </div>
            <button onclick="openCreate()" class="btn btn-primary">+ 작업지시 등록</button>
        </div>
        <div style="margin-bottom:16px;">
            <input type="text" id="searchInput" placeholder="검색..." oninput="filterTable()"
                style="padding:9px 14px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:8px;color:#e8eaf0;font-size:13px;font-family:inherit;outline:none;width:300px;">
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>제품명</th>
                        <th>생산 수량</th>
                        <th>시작일</th>
                        <th>상태</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(workOrderList)}">
                        <td colspan="6" class="empty-state">등록된 작업지시가 없습니다.</td>
                    </tr>
                    <tr th:each="w : ${workOrderList}">
                        <td th:text="${w.workOrderId}"></td>
                        <td th:text="${w.productName != null ? w.productName : w.productId}"></td>
                        <td class="qty" th:text="${w.quantity}"></td>
                        <td th:text="${w.startDate}"></td>
                        <td>
                            <span th:if="${w.status == 'PENDING'}"     class="badge badge-pending">대기</span>
                            <span th:if="${w.status == 'IN_PROGRESS'}" class="badge badge-inprogress">진행중</span>
                            <span th:if="${w.status == 'COMPLETED'}"   class="badge badge-completed">완료</span>
                            <span th:if="${w.status == 'CANCELLED'}"   class="badge badge-cancelled">취소</span>
                        </td>
                        <td>
                            <button class="btn-action btn-start"
                                    th:if="${w.status == 'PENDING'}"
                                    th:onclick="|changeStatus(${w.workOrderId}, 'IN_PROGRESS')|">시작</button>
                            <button class="btn-action btn-complete"
                                    th:if="${w.status == 'IN_PROGRESS'}"
                                    th:onclick="|changeStatus(${w.workOrderId}, 'COMPLETED')|">완료</button>
                            <button class="btn-action btn-receive"
                                    th:if="${w.status == 'IN_PROGRESS'}"
                                    th:onclick="|openProdReceipt(${w.workOrderId},${w.productId})|">생산입고</button>
                            <button class="btn-action btn-cancel-w"
                                    th:if="${w.status == 'PENDING' or w.status == 'IN_PROGRESS'}"
                                    th:onclick="|changeStatus(${w.workOrderId}, 'CANCELLED')|">취소</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Hidden product select for JS -->
<select id="productSourceSelect" style="display:none">
    <option value="">제품 선택</option>
    <option th:each="p : ${productList}" th:value="${p.productId}" th:text="${p.productName}"></option>
</select>

<!-- 생산 입고 처리 모달 -->
<div class="modal-overlay" id="prodReceiptModal">
    <div class="modal">
        <h3>생산 입고 처리</h3>
        <input type="hidden" id="prWorkOrderId">
        <input type="hidden" id="prProductId">
        <div class="form-group"><label>수량 *</label><input type="number" id="prQuantity" placeholder="0"></div>
        <div class="form-group">
            <label>입고 창고 *</label>
            <select id="prWarehouseId">
                <option value="">선택</option>
                <option th:each="w : ${warehouseList}" th:value="${w.warehouseId}" th:text="${w.warehouseName}"></option>
            </select>
        </div>
        <div class="form-group"><label>입고일시</label><input type="datetime-local" id="prReceiptDate"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closePrModal()">취소</button>
            <button class="btn-save" onclick="saveProdReceipt()">입고 처리</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>작업지시 등록</h3>
        <div class="form-group"><label>제품 *</label><select id="productId"></select></div>
        <div class="form-group"><label>생산 수량 *</label><input type="number" id="quantity" placeholder="0" min="1"></div>
        <div class="form-group"><label>시작일</label><input type="datetime-local" id="startDate"></div>
        <div class="form-group"><label>상태</label>
            <select id="status">
                <option value="PENDING">대기 (PENDING)</option>
                <option value="IN_PROGRESS">진행중 (IN_PROGRESS)</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="saveWorkOrder()">저장</button>
        </div>
    </div>
</div>

<script>
function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
function openCreate() {
    const src = document.getElementById('productSourceSelect');
    const dst = document.getElementById('productId');
    dst.innerHTML = src.innerHTML;
    document.getElementById('quantity').value = '';
    document.getElementById('startDate').value = '';
    document.getElementById('status').value = 'PENDING';
    document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function saveWorkOrder() {
    const data = {
        productId: document.getElementById('productId').value || null,
        quantity: document.getElementById('quantity').value || null,
        startDate: document.getElementById('startDate').value || null,
        status: document.getElementById('status').value
    };
    const csrf = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    fetch('/api/work-orders', {
        method: 'POST',
        headers: {'Content-Type':'application/json', [csrfHeader]: csrf},
        body: JSON.stringify(data)
    }).then(() => location.reload());
}
function changeStatus(id, status) {
    const csrf = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    fetch('/api/work-orders/' + id + '/status', {
        method: 'PATCH',
        headers: {'Content-Type':'application/json', [csrfHeader]: csrf},
        body: JSON.stringify({status: status})
    }).then(() => location.reload());
}
function openProdReceipt(workOrderId, productId) {
    document.getElementById('prWorkOrderId').value = workOrderId;
    document.getElementById('prProductId').value = productId;
    document.getElementById('prQuantity').value = '';
    document.getElementById('prWarehouseId').value = '';
    document.getElementById('prReceiptDate').value = '';
    document.getElementById('prodReceiptModal').classList.add('open');
}
function closePrModal() { document.getElementById('prodReceiptModal').classList.remove('open'); }
function saveProdReceipt() {
    const csrf = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    const data = {
        workOrderId: document.getElementById('prWorkOrderId').value,
        productId: document.getElementById('prProductId').value,
        quantity: document.getElementById('prQuantity').value,
        warehouseId: document.getElementById('prWarehouseId').value,
        receiptDate: document.getElementById('prReceiptDate').value
    };
    fetch('/api/production-receipts', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => location.reload());
}
</script>
</body>
</html>
