<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>로그인 | 개발팬 ERP</title><link rel="stylesheet" th:href="@{/css/erp.css(v=6)}">
</head>
<body class="login-page">
<div class="login-wrap"><div class="logo-area"><div class="logo-icon"></div><div class="logo-title">GAEBALFAN</div><div class="logo-sub">개발환기좀시키자 ERP 시스템</div></div><div class="login-card"><div class="card-header"><h2>로그인</h2><p>관리자로부터 부여받은 계정으로 로그인하세요.</p></div><div th:if="${errorMsg}" class="alert alert-error"><span th:text="${errorMsg}"></span></div><div th:if="${logoutMsg}" class="alert alert-success"><span th:text="${logoutMsg}"></span></div><form th:action="@{/login}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/><div class="form-group"><label class="login-label" for="username">아이디</label><input class="login-input" type="text" id="username" name="username" placeholder="로그인 ID를 입력하세요" autofocus required/></div><div class="form-group"><label class="login-label" for="password">비밀번호</label><input class="login-input" type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required/></div><button type="submit" class="btn-login">로그인</button></form></div><div class="footer-note"><span>GAEBALFAN ERP</span> &nbsp;·&nbsp; 계정 문의는 관리자에게 연락하세요
    </div>
</div>
</body>
</html>
