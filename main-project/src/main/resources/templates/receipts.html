<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head><meta charset="UTF-8"><meta name="_csrf" th:content="${_csrf.token}"><meta name="_csrf_header" th:content="${_csrf.headerName}"><title>입고 관리 | 개발팬 ERP</title><link rel="stylesheet" th:href="@{/css/erp.css(v=13)}">
</head>
<body>
<div class="layout"><aside th:replace="~{fragments/sidebar :: nav('receipts')}"></aside><main class="main"><div class="page-header"><div class="page-title"><h2>입고 관리</h2><p>발주 기반 입고 현황을 관리합니다.</p></div><button onclick="openCreate()" class="btn btn-primary">+ 입고 등록</button></div><div class="search-bar"><input type="text" id="searchInput" placeholder="제품명, 입고일 검색..." oninput="filterTable()" class="search-input"></div><div class="card"><table id="receiptTable"><thead><tr><th class="sort-th" onclick="sortTable(this,0,'str')">제품명<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,1,'num')">수량<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,2,'str')">입고일<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th></tr></thead><tbody><tr th:if="${#lists.isEmpty(receiptList)}"><td colspan="3" class="empty-state">등록된 입고 내역이 없습니다.</td></tr><tr th:each="r : ${receiptList}"><td th:text="${r.productName != null ? r.productName : r.productId}"></td><td class="qty" th:text="${r.quantity}"></td><td th:text="${r.receiptDate}"></td></tr></tbody></table></div><!-- 페이지네이션 --><div class="pagination" th:if="${totalPages != null and totalPages > 1}"><a th:href="@{/receipts(page=${currentPage - 1})}"
               th:classappend="${currentPage == 1} ? 'disabled'">&laquo;</a><th:block th:each="i : ${#numbers.sequence(pageStart, pageEnd)}"><a th:href="@{/receipts(page=${i})}"
                   th:text="${i}"
                   th:classappend="${i == currentPage} ? 'active'"></a></th:block><a th:href="@{/receipts(page=${currentPage + 1})}"
               th:classappend="${currentPage == totalPages} ? 'disabled'">&raquo;</a></div></main>
</div><!-- 입고 등록 모달 -->
<div class="modal-overlay" id="receiptModal"><div class="modal"><h3>입고 등록</h3><div class="form-group"><label>발주 번호 *</label><select id="rPoId"><option value="">선택</option><option th:each="po : ${purchaseOrderList}" th:if="${po.status == 'APPROVED'}" th:value="${po.poId}" th:data-item="${po.item}" th:text="${po.poCode != null ? po.poCode : 'PO-' + po.poId} + ' (' + ${po.supplierName} + ')'"></option></select></div><div class="form-group"><label>제품 *</label><select id="rProductId"><option value="">선택</option><option th:each="p : ${productList}" th:value="${p.productId}" th:text="${p.productName}"></option></select></div><div class="form-group"><label>수량 *</label><input type="number" id="rQuantity" placeholder="0" min="1"></div><div class="form-group"><label>입고 창고 *</label><select id="rWarehouseId"><option value="">선택</option><option th:each="w : ${warehouseList}" th:value="${w.warehouseId}" th:text="${w.warehouseName}"></option></select></div><div class="form-group"><label>입고일</label><input type="date" id="rReceiptDate"></div><div class="modal-footer"><button class="btn-cancel-modal" onclick="closeReceiptModal()">취소</button><button class="btn-save" onclick="saveReceipt()">저장</button></div></div>
</div><script>
const csrf = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
const _sort = {col:-1, asc:true};
function sortTable(th, col, type) {
    document.querySelectorAll('.sort-th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    _sort.asc = _sort.col === col ? !_sort.asc : true;
    _sort.col = col;
    th.classList.add(_sort.asc ? 'sort-asc' : 'sort-desc');
    const tbody = document.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr')).filter(tr => tr.querySelectorAll('td').length > 1);
    rows.sort((a, b) => {
        const va = a.querySelectorAll('td')[col].textContent.trim();
        const vb = b.querySelectorAll('td')[col].textContent.trim();
        const cmp = type === 'num' ? (parseFloat(va.replace(/,/g,''))||0) - (parseFloat(vb.replace(/,/g,''))||0) : va.localeCompare(vb, 'ko');
        return _sort.asc ? cmp : -cmp;
    });
    rows.forEach(r => tbody.appendChild(r));
}
function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
document.getElementById('rPoId').addEventListener('change', function() {
    const selected = this.options[this.selectedIndex];
    const item = selected.dataset.item;
    if (item) document.getElementById('rQuantity').value = item;
    else document.getElementById('rQuantity').value = '';
});
function openCreate() { document.getElementById('receiptModal').classList.add('open'); }
function closeReceiptModal() { document.getElementById('receiptModal').classList.remove('open'); }
function saveReceipt() {
    const data = {
        poId: document.getElementById('rPoId').value,
        productId: document.getElementById('rProductId').value,
        quantity: document.getElementById('rQuantity').value,
        warehouseId: document.getElementById('rWarehouseId').value,
        receiptDate: document.getElementById('rReceiptDate').value
    };
    fetch('/api/receipts', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(res => {
            if (!res.ok) {
                const msg = res.headers.get('X-Error-Message') || '입고 등록에 실패했습니다.';
                alert(msg);
            } else {
                location.reload();
            }
        });
}
</script>
</body>
</html>
