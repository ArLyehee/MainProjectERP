<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>직원 관리 | 개발팬 ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#4f8ef7; --text:#e8eaf0; --text-muted:#6b7280; --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; }
        body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans KR',sans-serif; min-height:100vh; }
        .layout { display:flex; min-height:100vh; }
        :root { --sidebar-w:220px; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto; }
        .sidebar-logo { padding:20px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .sidebar-logo .s-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
        .sidebar-logo .brand { font-size:13px; font-weight:600; line-height:1.3; }
        .sidebar-logo .brand small { display:block; font-size:10px; color:var(--accent); letter-spacing:1px; font-weight:400; }
        .nav-section { padding:14px 12px 5px; font-size:10px; letter-spacing:1.5px; color:var(--text-muted); text-transform:uppercase; }
        .nav-item { display:flex; align-items:center; gap:9px; padding:9px 12px; margin:2px 8px; border-radius:7px; font-size:13px; color:var(--text-muted); text-decoration:none; transition:background .15s,color .15s; }
        .nav-item:hover { background:rgba(79,142,247,.08); color:var(--text); }
        .nav-item.active { background:rgba(79,142,247,.15); color:var(--accent); font-weight:500; }
        .ni { font-size:15px; width:20px; text-align:center; }
        .sidebar-bottom { margin-top:auto; padding:14px; border-top:1px solid var(--border); }
        .user-info { display:flex; align-items:center; gap:9px; padding:8px; border-radius:7px; }
        .avatar { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; color:#fff; }
        .user-meta { flex:1; min-width:0; }
        .uname { font-size:12px; font-weight:500; }
        .urole { font-size:10px; color:var(--accent); letter-spacing:.5px; }
        .btn-logout { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px; padding:3px; border-radius:4px; transition:color .15s; }
        .btn-logout:hover { color:#ef4444; }
        .main { flex:1; padding:32px; overflow-x:auto; margin-left:var(--sidebar-w); }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
        .page-title h2 { font-size:20px; font-weight:600; }
        .page-title p { font-size:13px; color:var(--text-muted); margin-top:4px; }
        .btn { padding:9px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#3b7de8; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { padding:12px 16px; text-align:left; font-size:11px; font-weight:500; color:var(--text-muted); letter-spacing:.8px; text-transform:uppercase; border-bottom:1px solid var(--border); background:rgba(0,0,0,.2); }
        td { padding:13px 16px; border-bottom:1px solid rgba(42,45,58,.5); color:var(--text); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(79,142,247,.04); }
        .badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; }
        .badge-active   { background:rgba(34,197,94,.15); color:#4ade80; }
        .badge-resigned { background:rgba(107,114,128,.15); color:#9ca3af; }
        .sub-text { font-size:12px; color:var(--text-muted); }
        .empty-state { text-align:center; padding:60px; color:var(--text-muted); }
        .btn-action { padding:4px 10px; border-radius:5px; border:none; cursor:pointer; font-size:12px; font-family:inherit; }
        .btn-edit { background:rgba(79,142,247,.15); color:#4f8ef7; }
        .btn-edit:hover { background:rgba(79,142,247,.3); }
        .btn-status { background:rgba(245,158,11,.15); color:#fbbf24; margin-left:4px; }
        .btn-status:hover { background:rgba(245,158,11,.3); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:#1a1d27; border:1px solid #2a2d3a; border-radius:12px; padding:28px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; }
        .modal h3 { font-size:16px; font-weight:600; margin-bottom:20px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:12px; color:#6b7280; margin-bottom:6px; }
        .form-group input, .form-group textarea, .form-group select { width:100%; padding:9px 12px; background:#0f1117; border:1px solid #2a2d3a; border-radius:7px; color:#e8eaf0; font-size:13px; font-family:inherit; outline:none; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:#4f8ef7; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
        .btn-cancel { padding:8px 16px; border-radius:7px; border:1px solid #2a2d3a; background:transparent; color:#6b7280; cursor:pointer; font-size:13px; font-family:inherit; }
        .btn-cancel:hover { color:#e8eaf0; }
        .btn-save { padding:8px 16px; border-radius:7px; border:none; background:#4f8ef7; color:#fff; cursor:pointer; font-size:13px; font-family:inherit; font-weight:500; }
        .btn-save:hover { background:#3b7de8; }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('employees')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>👤 직원 관리</h2>
                <p>임직원 정보를 조회하고 관리합니다.</p>
            </div>
            <button onclick="openCreate()" class="btn btn-primary">+ 직원 등록</button>
        </div>
        <div style="margin-bottom:16px;">
            <input type="text" id="searchInput" placeholder="검색..." oninput="filterTable()"
                style="padding:9px 14px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:8px;color:#e8eaf0;font-size:13px;font-family:inherit;outline:none;width:300px;">
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>이름</th>
                        <th>부서 / 직급</th>
                        <th>이메일</th>
                        <th>연락처</th>
                        <th>입사일</th>
                        <th>상태</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(employeeList)}">
                        <td colspan="8" class="empty-state">등록된 직원이 없습니다.</td>
                    </tr>
                    <tr th:each="e : ${employeeList}">
                        <td th:text="${e.employeeId}"></td>
                        <td th:text="${e.name}"></td>
                        <td>
                            <div th:text="${e.departmentName}"></div>
                            <div class="sub-text" th:text="${e.positionName}"></div>
                        </td>
                        <td class="sub-text" th:text="${e.email}"></td>
                        <td class="sub-text" th:text="${e.phone}"></td>
                        <td class="sub-text" th:text="${e.hireDate}"></td>
                        <td>
                            <span th:if="${e.status == 'ACTIVE'}"   class="badge badge-active">재직</span>
                            <span th:if="${e.status == 'RESIGNED'}" class="badge badge-resigned">퇴직</span>
                            <span th:if="${e.status == 'INACTIVE'}" class="badge badge-resigned">비활성</span>
                        </td>
                        <td>
                            <button class="btn-action btn-edit" th:onclick="|openEdit(${e.employeeId})|">수정</button>
                            <button class="btn-action btn-status"
                                    th:if="${e.status == 'ACTIVE'}"
                                    th:onclick="|updateStatus(${e.employeeId}, 'INACTIVE')|">비활성화</button>
                            <button class="btn-action btn-edit"
                                    th:if="${e.status != 'ACTIVE'}"
                                    th:onclick="|updateStatus(${e.employeeId}, 'ACTIVE')|">활성화</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Hidden Thymeleaf-rendered selects for JS to read -->
<select id="deptSourceSelect" style="display:none">
    <option value="">부서 선택</option>
    <option th:each="d : ${departmentList}" th:value="${d.departmentId}" th:text="${d.departmentName}"></option>
</select>
<select id="posSourceSelect" style="display:none">
    <option value="">직급 선택</option>
    <option th:each="p : ${positionList}" th:value="${p.positionId}" th:text="${p.positionName}"></option>
</select>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">직원 등록</h3>
        <input type="hidden" id="employeeId">
        <div class="form-row">
            <div class="form-group"><label>이름 *</label><input type="text" id="name" placeholder="이름 입력"></div>
            <div class="form-group"><label>이메일</label><input type="email" id="email" placeholder="이메일 입력"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>전화번호</label><input type="text" id="phone" placeholder="전화번호 입력"></div>
            <div class="form-group"><label>입사일</label><input type="date" id="hireDate"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>부서</label><select id="departmentId"></select></div>
            <div class="form-group"><label>직급</label><select id="positionId"></select></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>급여 (원)</label><input type="number" id="salary" placeholder="0"></div>
            <div class="form-group"><label>상태</label>
                <select id="status">
                    <option value="ACTIVE">재직 (ACTIVE)</option>
                    <option value="INACTIVE">비활성 (INACTIVE)</option>
                    <option value="RESIGNED">퇴직 (RESIGNED)</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="saveEmployee()">저장</button>
        </div>
    </div>
</div>

<script>
function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
function populateSelects() {
    const deptSrc = document.getElementById('deptSourceSelect');
    const posSrc = document.getElementById('posSourceSelect');
    const deptDst = document.getElementById('departmentId');
    const posDst = document.getElementById('positionId');
    deptDst.innerHTML = deptSrc.innerHTML;
    posDst.innerHTML = posSrc.innerHTML;
}
function openCreate() {
    populateSelects();
    document.getElementById('modalTitle').textContent = '직원 등록';
    document.getElementById('employeeId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('email').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('hireDate').value = '';
    document.getElementById('departmentId').value = '';
    document.getElementById('positionId').value = '';
    document.getElementById('salary').value = '';
    document.getElementById('status').value = 'ACTIVE';
    document.getElementById('modalOverlay').classList.add('open');
}
function openEdit(id) {
    fetch('/api/employees/' + id)
        .then(r => r.json())
        .then(e => {
            populateSelects();
            document.getElementById('modalTitle').textContent = '직원 수정';
            document.getElementById('employeeId').value = e.employeeId;
            document.getElementById('name').value = e.name || '';
            document.getElementById('email').value = e.email || '';
            document.getElementById('phone').value = e.phone || '';
            document.getElementById('hireDate').value = e.hireDate || '';
            document.getElementById('departmentId').value = e.departmentId || '';
            document.getElementById('positionId').value = e.positionId || '';
            document.getElementById('salary').value = e.salary || '';
            document.getElementById('status').value = e.status || 'ACTIVE';
            document.getElementById('modalOverlay').classList.add('open');
        });
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function saveEmployee() {
    const id = document.getElementById('employeeId').value;
    const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        hireDate: document.getElementById('hireDate').value || null,
        departmentId: document.getElementById('departmentId').value || null,
        positionId: document.getElementById('positionId').value || null,
        salary: document.getElementById('salary').value || null,
        status: document.getElementById('status').value
    };
    const url = id ? '/api/employees/' + id : '/api/employees';
    const method = id ? 'PUT' : 'POST';
    const csrf = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    fetch(url, { method, headers: {'Content-Type':'application/json', [csrfHeader]: csrf}, body: JSON.stringify(data) })
        .then(() => location.reload());
}
function updateStatus(id, status) {
    const csrf = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    fetch('/api/employees/' + id + '/status', {
        method: 'PATCH',
        headers: {'Content-Type':'application/json', [csrfHeader]: csrf},
        body: JSON.stringify({status: status})
    }).then(() => location.reload());
}
</script>
</body>
</html>
