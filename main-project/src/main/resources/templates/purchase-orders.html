<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head><meta charset="UTF-8"><meta name="_csrf" th:content="${_csrf.token}"><meta name="_csrf_header" th:content="${_csrf.headerName}"><title>발주 관리 | 개발팬 ERP</title><link rel="stylesheet" th:href="@{/css/erp.css(v=6)}">
</head>
<body>
<div class="layout"><aside th:replace="~{fragments/sidebar :: nav('purchase-orders')}"></aside><main class="main"><div class="page-header"><div class="page-title"><h2>발주 관리</h2><p>공급업체 발주 현황을 관리합니다.</p></div><button onclick="openCreate()" class="btn btn-primary">+ 발주 등록</button></div><div class="search-bar"><input type="text" id="searchInput" placeholder="공급업체, 발주일, 상태 검색..." oninput="filterTable()" class="search-input"></div><div class="card"><table id="poTable"><thead><tr><th class="sort-th" onclick="sortTable(this,0,'str')">공급업체<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,1,'str')">발주일<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,2,'str')">상태<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th>액션</th></tr></thead><tbody><tr th:if="${#lists.isEmpty(purchaseOrderList)}"><td colspan="4" class="empty-state">등록된 발주가 없습니다.</td></tr><tr th:each="po : ${purchaseOrderList}"><td><div th:text="${po.supplierName != null ? po.supplierName : po.supplierId}"></div><div class="sub-text" th:text="${po.poCode}" th:if="${po.poCode != null}"></div></td><td th:text="${po.orderDate != null ? po.orderDate.toString().substring(0,10) : '-'}"></td><td><span th:class="'badge badge-' + ${#strings.toLowerCase(po.status)}"
                                  th:text="${po.status == 'PENDING' ? '대기' :
                                             po.status == 'APPROVED' ? '승인' :
                                             po.status == 'RECEIVED' ? '입고완료' :
                                             po.status == 'COMPLETED' ? '완료' : '취소'}"></span></td><td><span th:if="${po.status == 'PENDING'}"><button class="btn-action btn-approve" th:onclick="|changePoStatus(${po.poId},'APPROVED')|">승인</button><button class="btn-action btn-complete" th:onclick="|changePoStatus(${po.poId},'COMPLETED')|">완료</button></span><span th:if="${po.status == 'APPROVED'}"><button class="btn-action btn-receive" th:onclick="|changePoStatus(${po.poId},'RECEIVED')|">입고완료</button><button class="btn-action btn-complete" th:onclick="|changePoStatus(${po.poId},'COMPLETED')|">완료</button></span></td></tr></tbody></table></div></main>
</div><!-- 발주 등록 모달 -->
<div class="modal-overlay" id="poModal"><div class="modal"><h3>발주 등록</h3><div class="form-group"><label>공급업체 *</label><select id="poSupplierId"><option value="">선택</option><option th:each="s : ${supplierList}" th:value="${s.supplierId}" th:text="${s.supplierName}"></option></select></div><div class="form-group"><label>발주일 *</label><input type="date" id="poOrderDate"></div><div class="modal-footer"><button class="btn-cancel-modal" onclick="closePoModal()">취소</button><button class="btn-save" onclick="savePo()">저장</button></div></div>
</div><script>
const csrf = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
const _sort = {col:-1, asc:true};
function sortTable(th, col, type) {
    document.querySelectorAll('.sort-th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    _sort.asc = _sort.col === col ? !_sort.asc : true;
    _sort.col = col;
    th.classList.add(_sort.asc ? 'sort-asc' : 'sort-desc');
    const tbody = document.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr')).filter(tr => tr.querySelectorAll('td').length > 1);
    rows.sort((a, b) => {
        const va = a.querySelectorAll('td')[col].textContent.trim();
        const vb = b.querySelectorAll('td')[col].textContent.trim();
        const cmp = type === 'num' ? (parseFloat(va.replace(/,/g,''))||0) - (parseFloat(vb.replace(/,/g,''))||0) : va.localeCompare(vb, 'ko');
        return _sort.asc ? cmp : -cmp;
    });
    rows.forEach(r => tbody.appendChild(r));
}
function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
function openCreate() { document.getElementById('poModal').classList.add('open'); }
function closePoModal() { document.getElementById('poModal').classList.remove('open'); }
function savePo() {
    const supplierId = document.getElementById('poSupplierId').value;
    const orderDate  = document.getElementById('poOrderDate').value;
    if (!supplierId) { alert('공급업체를 선택하세요.'); return; }
    if (!orderDate)  { alert('발주일을 입력하세요.'); return; }
    const data = { supplierId: supplierId, orderDate: orderDate + 'T00:00:00', status: 'PENDING' };
    fetch('/api/purchase-orders', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(r => {
            if (r.ok) { location.reload(); }
            else { r.text().then(t => alert('발주 등록 실패: ' + r.status + '\n' + t)); }
        })
        .catch(e => alert('네트워크 오류: ' + e));
}
function changePoStatus(id, status) {
    if (!confirm('상태를 변경하시겠습니까?')) return;
    fetch('/api/purchase-orders/' + id + '/status', { method:'PATCH', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify({status}) })
        .then(() => location.reload());
}
</script>
</body>
</html>
