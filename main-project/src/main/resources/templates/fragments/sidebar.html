<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside th:fragment="nav(current)" class="sidebar">
    <div class="sidebar-logo">
        <div class="s-icon">🌬️</div>
        <div class="brand">개발환기좀해 ERP<small>GAEBALFAN</small></div>
    </div>

    <div class="nav-section">메인</div>
    <a href="/dashboard"       th:class="${current == 'dashboard'}       ? 'nav-item active' : 'nav-item'"><span class="ni">📊</span> 대시보드</a>

    <div class="nav-section">재고/물류</div>
    <a href="/inventory"       th:class="${current == 'inventory'}       ? 'nav-item active' : 'nav-item'"><span class="ni">📦</span> 재고 현황</a>
    <a href="/purchase-orders" th:class="${current == 'purchase-orders'} ? 'nav-item active' : 'nav-item'"><span class="ni">📋</span> 발주 관리</a>
    <a href="/receipts"        th:class="${current == 'receipts'}        ? 'nav-item active' : 'nav-item'"><span class="ni">📥</span> 입고 관리</a>
    <a href="/shipments"       th:class="${current == 'shipments'}       ? 'nav-item active' : 'nav-item'"><span class="ni">📤</span> 출고 관리</a>
    <a href="/sales"           th:class="${current == 'sales'}           ? 'nav-item active' : 'nav-item'"><span class="ni">💰</span> 매출 관리</a>
    <a href="/expenses"        th:class="${current == 'expenses'}        ? 'nav-item active' : 'nav-item'"><span class="ni">💸</span> 비용 관리</a>

    <div class="nav-section">경영</div>
    <a href="/finance" th:class="${current == 'finance'} ? 'nav-item active' : 'nav-item'"><span class="ni">📈</span> 재무제표</a>

    <div class="nav-section">기준정보</div>
    <a href="/products"        th:class="${current == 'products'}        ? 'nav-item active' : 'nav-item'"><span class="ni">🔧</span> 제품 관리</a>
    <a href="/suppliers"       th:class="${current == 'suppliers'}       ? 'nav-item active' : 'nav-item'"><span class="ni">🏭</span> 공급업체</a>
    <a href="/warehouses"      th:class="${current == 'warehouses'}      ? 'nav-item active' : 'nav-item'"><span class="ni">🏢</span> 창고 관리</a>

    <div class="nav-section">인사</div>
    <a href="/employees"       th:class="${current == 'employees'}       ? 'nav-item active' : 'nav-item'"><span class="ni">👤</span> 직원 관리</a>
    <a href="/attendance"      th:class="${current == 'attendance'}      ? 'nav-item active' : 'nav-item'"><span class="ni">📅</span> 근태 관리</a>

    <div class="nav-section">생산관리</div>
    <a href="/work-orders"     th:class="${current == 'work-orders'}     ? 'nav-item active' : 'nav-item'"><span class="ni">⚙️</span> 작업지시</a>
    <a href="/bom"             th:class="${current == 'bom'}             ? 'nav-item active' : 'nav-item'"><span class="ni">📋</span> BOM 관리</a>

    <div class="nav-section" sec:authorize="hasRole('ADMIN')">관리자</div>
    <a href="/admin/users" class="nav-item" sec:authorize="hasRole('ADMIN')"><span class="ni">👥</span> 사용자 관리</a>
    <a href="/admin/settings" th:class="${current == 'admin-settings'} ? 'nav-item active' : 'nav-item'" sec:authorize="hasRole('ADMIN')"><span class="ni">⚙️</span> 시스템 설정</a>

    <div class="sidebar-bottom">
        <div class="user-info">
            <div class="avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">A</div>
            <div class="user-meta">
                <div class="uname" sec:authentication="name">admin</div>
                <div class="urole" sec:authentication="principal.authorities[0].authority">ROLE</div>
            </div>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout" title="로그아웃">⏻</button>
            </form>
        </div>
    </div>
</aside>
</body>
</html>
