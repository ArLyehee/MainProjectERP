<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head><meta charset="UTF-8"><meta name="_csrf" th:content="${_csrf.token}"><meta name="_csrf_header" th:content="${_csrf.headerName}"><title>사용자 관리 | 개발팬 ERP</title><link rel="stylesheet" th:href="@{/css/erp.css(v=6)}">
</head>
<body>
<div class="layout"><aside th:replace="~{fragments/sidebar :: nav('admin-users')}"></aside><main class="main"><div class="page-header"><div class="page-title"><h2>사용자 관리</h2><p>시스템 사용자 계정을 조회하고 관리합니다.</p></div><button onclick="openCreate()" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">+ 사용자 등록</button></div><div class="search-bar"><input type="text" id="searchInput" placeholder="사용자명, 이름, 역할, 부서 검색..." oninput="filterTable()" class="search-input"></div><div id="userTableArea"><div class="card"><table id="userTable"><thead><tr><th class="sort-th" onclick="sortTable(this,0,'num')">ID<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,1,'str')">사용자명<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,2,'str')">이름<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,3,'str')">역할<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,4,'str')">부서<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,5,'str')">상태<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th>액션</th></tr></thead><tbody id="userTableBody"><tr><td colspan="7" class="empty-state">로딩 중...</td></tr></tbody></table></div></div></main>
</div><!-- 사용자 등록 모달 -->
<div class="modal-overlay" id="modalOverlay" sec:authorize="hasRole('ADMIN')"><div class="modal"><h3>사용자 등록</h3><div class="form-row"><div class="form-group"><label>사용자명 *</label><input type="text" id="uUsername" placeholder="로그인 ID"></div><div class="form-group"><label>비밀번호 *</label><input type="password" id="uPassword" placeholder="비밀번호"></div></div><div class="form-row"><div class="form-group"><label>이름</label><input type="text" id="uName" placeholder="실명"></div><div class="form-group"><label>이메일</label><input type="email" id="uEmail" placeholder="이메일 주소"></div></div><div class="form-row"><div class="form-group"><label>전화번호</label><input type="text" id="uPhone" placeholder="전화번호"></div><div class="form-group"><label>부서</label><input type="text" id="uDepartment" placeholder="부서명"></div></div><div class="form-group"><label>역할</label><select id="uRole" onchange="onRoleChange('create')"><option value="EMPLOYEE">EMPLOYEE</option><option value="MANAGER">MANAGER</option><option value="ADMIN">ADMIN</option></select></div><div class="form-group" id="createPermBox"><label>페이지 접근 권한</label><div class="perm-grid" id="createPermissions"><div class="perm-section-label">재고/물류</div><label class="perm-item"><input type="checkbox" value="inventory"> 재고현황</label><label class="perm-item"><input type="checkbox" value="purchase-orders"> 발주관리</label><label class="perm-item"><input type="checkbox" value="receipts"> 입고관리</label><label class="perm-item"><input type="checkbox" value="shipments"> 출고관리</label><label class="perm-item"><input type="checkbox" value="sales"> 매출관리</label><label class="perm-item"><input type="checkbox" value="expenses"> 비용관리</label><label class="perm-item"><input type="checkbox" value="transaction-statements"> 거래명세서</label><div class="perm-section-label">경영/기준</div><label class="perm-item"><input type="checkbox" value="finance"> 재무제표</label><label class="perm-item"><input type="checkbox" value="products"> 제품관리</label><label class="perm-item"><input type="checkbox" value="suppliers"> 공급업체</label><label class="perm-item"><input type="checkbox" value="warehouses"> 창고관리</label><div class="perm-section-label">인사/생산</div><label class="perm-item"><input type="checkbox" value="employees"> 직원관리</label><label class="perm-item"><input type="checkbox" value="attendance"> 근태관리</label><label class="perm-item"><input type="checkbox" value="work-orders"> 작업지시</label><label class="perm-item"><input type="checkbox" value="bom"> BOM관리</label></div></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-save" onclick="createUser()">등록</button></div></div>
</div><!-- 사용자 수정 모달 -->
<div class="modal-overlay" id="editModalOverlay"><div class="modal"><h3>사용자 수정</h3><input type="hidden" id="editUserId"><div class="form-row"><div class="form-group"><label>이름</label><input type="text" id="editName" placeholder="실명"></div><div class="form-group"><label>이메일</label><input type="email" id="editEmail" placeholder="이메일 주소"></div></div><div class="form-row"><div class="form-group"><label>전화번호</label><input type="text" id="editPhone" placeholder="전화번호"></div><div class="form-group"><label>부서</label><input type="text" id="editDepartment" placeholder="부서명"></div></div><div class="form-row"><div class="form-group"><label>역할</label><select id="editRole" onchange="onRoleChange('edit')"><option value="EMPLOYEE">EMPLOYEE</option><option value="MANAGER">MANAGER</option><option value="ADMIN">ADMIN</option></select></div><div class="form-group"><label>새 비밀번호 (선택)</label><input type="password" id="editPassword" placeholder="변경 시에만 입력"></div></div><div class="form-group" id="editPermBox"><label>페이지 접근 권한</label><div class="perm-grid" id="editPermissions"><div class="perm-section-label">재고/물류</div><label class="perm-item"><input type="checkbox" value="inventory"> 재고현황</label><label class="perm-item"><input type="checkbox" value="purchase-orders"> 발주관리</label><label class="perm-item"><input type="checkbox" value="receipts"> 입고관리</label><label class="perm-item"><input type="checkbox" value="shipments"> 출고관리</label><label class="perm-item"><input type="checkbox" value="sales"> 매출관리</label><label class="perm-item"><input type="checkbox" value="expenses"> 비용관리</label><label class="perm-item"><input type="checkbox" value="transaction-statements"> 거래명세서</label><div class="perm-section-label">경영/기준</div><label class="perm-item"><input type="checkbox" value="finance"> 재무제표</label><label class="perm-item"><input type="checkbox" value="products"> 제품관리</label><label class="perm-item"><input type="checkbox" value="suppliers"> 공급업체</label><label class="perm-item"><input type="checkbox" value="warehouses"> 창고관리</label><div class="perm-section-label">인사/생산</div><label class="perm-item"><input type="checkbox" value="employees"> 직원관리</label><label class="perm-item"><input type="checkbox" value="attendance"> 근태관리</label><label class="perm-item"><input type="checkbox" value="work-orders"> 작업지시</label><label class="perm-item"><input type="checkbox" value="bom"> BOM관리</label></div></div><div class="modal-footer"><button class="btn-cancel" onclick="closeEditModal()">취소</button><button class="btn-save" onclick="updateUser()">저장</button></div></div>
</div><script>
const csrf = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#userTableBody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
const _sort = {col:-1, asc:true};
function sortTable(th, col, type) {
    document.querySelectorAll('.sort-th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    _sort.asc = _sort.col === col ? !_sort.asc : true;
    _sort.col = col;
    th.classList.add(_sort.asc ? 'sort-asc' : 'sort-desc');
    const tbody = document.getElementById('userTableBody');
    const rows = Array.from(tbody.querySelectorAll('tr')).filter(tr => tr.querySelectorAll('td').length > 1);
    rows.sort((a, b) => {
        const va = a.querySelectorAll('td')[col].textContent.trim();
        const vb = b.querySelectorAll('td')[col].textContent.trim();
        const cmp = type === 'num' ? (parseFloat(va.replace(/,/g,''))||0) - (parseFloat(vb.replace(/,/g,''))||0) : va.localeCompare(vb, 'ko');
        return _sort.asc ? cmp : -cmp;
    });
    rows.forEach(r => tbody.appendChild(r));
}
function loadUsers() {
    fetch('/api/admin/users')
        .then(r => r.json())
        .then(users => {
            const tbody = document.getElementById('userTableBody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">등록된 사용자가 없습니다.</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `<tr><td>${u.userId || u.id || '-'}</td><td>${u.username || '-'}</td><td>${u.name || '-'}</td><td>${u.role || '-'}</td><td>${u.department || '-'}</td><td><span class="badge ${u.status === 'ACTIVE' ? 'badge-active' : 'badge-inactive'}">${u.status || '-'}</span></td><td><button class="btn-action btn-edit" onclick="openEdit(${u.userId})">수정</button><button class="btn-action btn-toggle" style="margin-left:4px" onclick="toggleStatus(${u.userId || u.id}, '${u.status}')">${u.status === 'ACTIVE' ? '비활성화' : '활성화'}
                    </button></td></tr>`).join('');
        })
        .catch(() => {
            document.getElementById('userTableBody').innerHTML = '<tr><td colspan="7" class="empty-state">데이터를 불러올 수 없습니다.</td></tr>';
        });
}

function onRoleChange(mode) {
    const role = document.getElementById(mode === 'create' ? 'uRole' : 'editRole').value;
    const box  = document.getElementById(mode === 'create' ? 'createPermBox' : 'editPermBox');
    box.style.display = (role === 'ADMIN') ? 'none' : 'block';
}

function openCreate() {
    document.getElementById('modalOverlay').classList.add('open');
    onRoleChange('create');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function createUser() {
    const perms = Array.from(document.querySelectorAll('#createPermissions input:checked'))
                       .map(cb => cb.value).join(',');
    const data = {
        username:    document.getElementById('uUsername').value,
        password:    document.getElementById('uPassword').value,
        name:        document.getElementById('uName').value,
        email:       document.getElementById('uEmail').value,
        phone:       document.getElementById('uPhone').value,
        department:  document.getElementById('uDepartment').value,
        role:        document.getElementById('uRole').value,
        permissions: perms
    };
    fetch('/api/admin/users', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => { closeModal(); loadUsers(); });
}

function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus === 'ACTIVE' ? 'INACTIVE' : 'ACTIVE';
    fetch('/api/admin/users/' + id + '/status', { method:'PATCH', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify({status: newStatus}) })
        .then(() => loadUsers());
}

document.addEventListener('DOMContentLoaded', loadUsers);

function openEdit(id) {
    fetch('/api/admin/users/' + id)
        .then(r => r.json())
        .then(u => {
            document.getElementById('editUserId').value = u.userId;
            document.getElementById('editName').value = u.name || '';
            document.getElementById('editEmail').value = u.email || '';
            document.getElementById('editPhone').value = u.phone || '';
            document.getElementById('editDepartment').value = u.department || '';
            document.getElementById('editRole').value = u.role || 'EMPLOYEE';
            document.getElementById('editPassword').value = '';
            const userPerms = (u.permissions || '').split(',').filter(p => p);
            document.querySelectorAll('#editPermissions input[type=checkbox]').forEach(cb => {
                cb.checked = userPerms.includes(cb.value);
            });
            onRoleChange('edit');
            document.getElementById('editModalOverlay').classList.add('open');
        });
}
function closeEditModal() { document.getElementById('editModalOverlay').classList.remove('open'); }
function updateUser() {
    const id = document.getElementById('editUserId').value;
    const perms = Array.from(document.querySelectorAll('#editPermissions input:checked'))
                       .map(cb => cb.value).join(',');
    const data = {
        name:        document.getElementById('editName').value,
        email:       document.getElementById('editEmail').value,
        phone:       document.getElementById('editPhone').value,
        department:  document.getElementById('editDepartment').value,
        role:        document.getElementById('editRole').value,
        password:    document.getElementById('editPassword').value,
        permissions: perms
    };
    fetch('/api/admin/users/' + id, { method:'PUT', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => { closeEditModal(); loadUsers(); });
}
</script>
</body>
</html>
