<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>BOM 관리 | 개발팬 ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#4f8ef7; --text:#e8eaf0; --text-muted:#6b7280; --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; }
        body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans KR',sans-serif; min-height:100vh; }
        .layout { display:flex; min-height:100vh; }
        :root { --sidebar-w:220px; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto; }
        .sidebar-logo { padding:20px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .sidebar-logo .s-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
        .sidebar-logo .brand { font-size:13px; font-weight:600; line-height:1.3; }
        .sidebar-logo .brand small { display:block; font-size:10px; color:var(--accent); letter-spacing:1px; font-weight:400; }
        .nav-section { padding:14px 12px 5px; font-size:10px; letter-spacing:1.5px; color:var(--text-muted); text-transform:uppercase; }
        .nav-item { display:flex; align-items:center; gap:9px; padding:9px 12px; margin:2px 8px; border-radius:7px; font-size:13px; color:var(--text-muted); text-decoration:none; transition:background .15s,color .15s; }
        .nav-item:hover { background:rgba(79,142,247,.08); color:var(--text); }
        .nav-item.active { background:rgba(79,142,247,.15); color:var(--accent); font-weight:500; }
        .ni { font-size:15px; width:20px; text-align:center; }
        .sidebar-bottom { margin-top:auto; padding:14px; border-top:1px solid var(--border); }
        .user-info { display:flex; align-items:center; gap:9px; padding:8px; border-radius:7px; }
        .avatar { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; color:#fff; }
        .user-meta { flex:1; min-width:0; }
        .uname { font-size:12px; font-weight:500; }
        .urole { font-size:10px; color:var(--accent); letter-spacing:.5px; }
        .btn-logout { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px; padding:3px; border-radius:4px; transition:color .15s; }
        .btn-logout:hover { color:#ef4444; }
        .main { flex:1; padding:32px; overflow-x:auto; margin-left:var(--sidebar-w); }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
        .page-title h2 { font-size:20px; font-weight:600; }
        .page-title p { font-size:13px; color:var(--text-muted); margin-top:4px; }
        .btn { padding:9px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#3b7de8; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { padding:12px 16px; text-align:left; font-size:11px; font-weight:500; color:var(--text-muted); letter-spacing:.8px; text-transform:uppercase; border-bottom:1px solid var(--border); background:rgba(0,0,0,.2); }
        td { padding:13px 16px; border-bottom:1px solid rgba(42,45,58,.5); color:var(--text); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(79,142,247,.04); }
        .empty-state { text-align:center; padding:60px; color:var(--text-muted); }
        .btn-action { padding:4px 10px; border-radius:5px; border:none; cursor:pointer; font-size:11px; font-family:inherit; font-weight:500; }
        .btn-edit { background:rgba(79,142,247,.15); color:#4f8ef7; }
        .btn-edit:hover { background:rgba(79,142,247,.3); }
        .btn-del { background:rgba(239,68,68,.15); color:#ef4444; }
        .btn-del:hover { background:rgba(239,68,68,.3); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:#1a1d27; border:1px solid #2a2d3a; border-radius:12px; padding:28px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; }
        .modal h3 { font-size:16px; font-weight:600; margin-bottom:20px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:12px; color:#6b7280; margin-bottom:6px; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:9px 12px; background:#0f1117; border:1px solid #2a2d3a; border-radius:7px; color:#e8eaf0; font-size:13px; font-family:inherit; outline:none; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#4f8ef7; }
        .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
        .btn-cancel { padding:8px 16px; border-radius:7px; border:1px solid #2a2d3a; background:transparent; color:#6b7280; cursor:pointer; font-size:13px; font-family:inherit; }
        .btn-cancel:hover { color:#e8eaf0; }
        .btn-save { padding:8px 16px; border-radius:7px; border:none; background:#4f8ef7; color:#fff; cursor:pointer; font-size:13px; font-family:inherit; font-weight:500; }
        .btn-save:hover { background:#3b7de8; }
        #itemList { list-style:none; margin-top:12px; }
        .items-section-title { font-size:12px; color:#6b7280; margin-top:16px; margin-bottom:4px; }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('bom')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>📋 BOM 관리</h2>
                <p>제품 자재명세서(BOM)를 조회하고 관리합니다.</p>
            </div>
            <button onclick="openCreate()" class="btn btn-primary">+ BOM 등록</button>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>BOM ID</th>
                        <th>제품명</th>
                        <th>BOM명</th>
                        <th>버전</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(bomList)}">
                        <td colspan="5" class="empty-state">등록된 BOM이 없습니다.</td>
                    </tr>
                    <tr th:each="b : ${bomList}">
                        <td th:text="${b.bomId}"></td>
                        <td th:text="${b.productName != null ? b.productName : b.productId}"></td>
                        <td th:text="${b.bomName}"></td>
                        <td th:text="${b.version}"></td>
                        <td>
                            <button class="btn-action btn-edit" th:onclick="|openItems(${b.bomId})|">부품 관리</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- BOM 등록 모달 -->
<div class="modal-overlay" id="bomModal">
    <div class="modal">
        <h3>BOM 등록</h3>
        <div class="form-group"><label>제품 *</label>
            <select id="bProductId">
                <option value="">선택</option>
                <option th:each="p : ${productList}" th:value="${p.productId}" th:text="${p.productName}"></option>
            </select>
        </div>
        <div class="form-group"><label>BOM명 *</label><input type="text" id="bBomName" placeholder="BOM 이름"></div>
        <div class="form-group"><label>버전</label><input type="text" id="bVersion" placeholder="예: 1.0"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="saveBom()">저장</button>
        </div>
    </div>
</div>

<!-- 부품 관리 모달 -->
<div class="modal-overlay" id="itemsModal">
    <div class="modal">
        <h3>부품 관리</h3>
        <p class="items-section-title">등록된 부품</p>
        <ul id="itemList"></ul>
        <div style="display:flex;gap:8px;margin-top:16px;border-top:1px solid #2a2d3a;padding-top:16px;">
            <select id="iComponentProductId" style="flex:2;padding:8px;background:#0f1117;border:1px solid #2a2d3a;border-radius:6px;color:#e8eaf0;font-size:12px;font-family:inherit;">
                <option value="">부품 제품 선택</option>
                <option th:each="p : ${productList}" th:value="${p.productId}" th:text="${p.productName}"></option>
            </select>
            <input type="number" id="iQuantity" placeholder="수량" step="0.01"
                style="flex:1;padding:8px;background:#0f1117;border:1px solid #2a2d3a;border-radius:6px;color:#e8eaf0;font-size:12px;font-family:inherit;">
            <button onclick="addItem()" class="btn-save" style="padding:8px 14px;font-size:12px;">추가</button>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeItemsModal()">닫기</button>
        </div>
    </div>
</div>

<script>
const csrf = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
let currentBomId = null;

function openCreate() { document.getElementById('bomModal').classList.add('open'); }
function closeModal() { document.getElementById('bomModal').classList.remove('open'); }

function saveBom() {
    const data = {
        productId: document.getElementById('bProductId').value,
        bomName: document.getElementById('bBomName').value,
        version: document.getElementById('bVersion').value || '1.0'
    };
    fetch('/api/bom', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => location.reload());
}

function openItems(bomId) {
    currentBomId = bomId;
    document.getElementById('itemsModal').classList.add('open');
    loadItems();
}

function closeItemsModal() { document.getElementById('itemsModal').classList.remove('open'); }

function loadItems() {
    fetch('/api/bom/' + currentBomId + '/items')
        .then(r => r.json())
        .then(items => {
            const ul = document.getElementById('itemList');
            ul.innerHTML = items.length === 0 ? '<li style="color:#6b7280;padding:8px 0">등록된 부품이 없습니다.</li>' :
                items.map(i => `<li style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #2a2d3a">
                    <span>${i.componentProductName || i.componentProductId} &times; ${i.quantity}</span>
                    <button class="btn-action btn-del" onclick="deleteItem(${i.bomItemId})">삭제</button>
                </li>`).join('');
        });
}

function addItem() {
    const data = {
        componentProductId: document.getElementById('iComponentProductId').value,
        quantity: document.getElementById('iQuantity').value
    };
    fetch('/api/bom/' + currentBomId + '/items', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => { document.getElementById('iComponentProductId').value=''; document.getElementById('iQuantity').value=''; loadItems(); });
}

function deleteItem(id) {
    fetch('/api/bom/items/' + id, { method:'DELETE', headers:{[csrfHeader]:csrf} })
        .then(() => loadItems());
}
</script>
</body>
</html>
