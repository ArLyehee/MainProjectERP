<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>비용 관리 | 개발팬 ERP</title>
    <link rel="stylesheet" th:href="@{/css/erp.css(v=4)}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('expenses')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>💸 비용 관리</h2>
                <p>운영비용 현황을 관리합니다.</p>
            </div>
            <button onclick="openCreate()" class="btn btn-primary">+ 비용 등록</button>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="검색..." oninput="filterTable()" class="search-input">
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>비용유형</th>
                        <th>금액 (원)</th>
                        <th>날짜</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(expenseList)}">
                        <td colspan="4" class="empty-state">등록된 비용이 없습니다.</td>
                    </tr>
                    <tr th:each="e : ${expenseList}">
                        <td th:text="${e.expenseId}"></td>
                        <td th:text="${e.expenseType}"></td>
                        <td class="amount" th:text="${#numbers.formatInteger(e.amount, 0, 'COMMA')}"></td>
                        <td th:text="${e.expenseDate}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>비용 등록</h3>
        <div class="form-group"><label>비용유형 *</label><input type="text" id="expenseType" placeholder="예: 임대료, 인건비, 전기요금"></div>
        <div class="form-group"><label>금액 (원) *</label><input type="number" id="amount" placeholder="0"></div>
        <div class="form-group"><label>날짜</label><input type="date" id="expenseDate"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="saveExpense()">저장</button>
        </div>
    </div>
</div>

<script>
const csrf = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

function openCreate() {
    document.getElementById('expenseType').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('expenseDate').value = '';
    document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveExpense() {
    const data = {
        expenseType: document.getElementById('expenseType').value,
        amount: document.getElementById('amount').value,
        expenseDate: document.getElementById('expenseDate').value
    };
    fetch('/api/expenses', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => location.reload());
}

function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
</script>
</body>
</html>
