<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head><meta charset="UTF-8"><meta name="_csrf" th:content="${_csrf.token}"><meta name="_csrf_header" th:content="${_csrf.headerName}"><title>비용 관리 | 개발팬 ERP</title><link rel="stylesheet" th:href="@{/css/erp.css(v=13)}">
</head>
<body>
<div class="layout"><aside th:replace="~{fragments/sidebar :: nav('expenses')}"></aside><main class="main"><div class="page-header"><div class="page-title"><h2>비용 관리</h2><p>운영비용 현황을 관리합니다.</p></div><button onclick="openCreate()" class="btn btn-primary">+ 비용 등록</button></div><div class="search-bar"><input type="text" id="searchInput" th:value="${q}" placeholder="비용유형, 날짜 검색..." class="search-input" oninput="doSearch(this.value)"></div><div class="card"><table><thead><tr><th class="sort-th" onclick="sortTable(this,0,'str')">비용유형<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,1,'num')">금액 (원)<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th><th class="sort-th" onclick="sortTable(this,2,'str')">날짜<span class="sort-btn"><span class="arr-up">▲</span><span class="arr-down">▼</span></span></th></tr></thead><tbody><tr th:if="${#lists.isEmpty(expenseList)}"><td colspan="3" class="empty-state">등록된 비용이 없습니다.</td></tr><tr th:each="e : ${expenseList}"><td th:text="${e.expenseType}"></td><td class="amount" th:text="${#numbers.formatInteger(e.amount, 0, 'COMMA')}"></td><td th:text="${e.expenseDate}"></td></tr></tbody></table></div><div class="pagination" th:if="${totalPages != null and totalPages > 1}"><a th:href="@{/expenses(page=${currentPage - 1},q=${q})}" th:classappend="${currentPage == 1} ? 'disabled'">&laquo;</a><th:block th:each="i : ${#numbers.sequence(pageStart, pageEnd)}"><a th:href="@{/expenses(page=${i},q=${q})}" th:text="${i}" th:classappend="${i == currentPage} ? 'active'"></a></th:block><a th:href="@{/expenses(page=${currentPage + 1},q=${q})}" th:classappend="${currentPage == totalPages} ? 'disabled'">&raquo;</a></div></main>
</div><div class="modal-overlay" id="modalOverlay"><div class="modal"><h3>비용 등록</h3><div class="form-group"><label>비용유형 *</label><input type="text" id="expenseType" placeholder="예: 임대료, 인건비, 전기요금"></div><div class="form-group"><label>금액 (원) *</label><input type="number" id="amount" placeholder="0"></div><div class="form-group"><label>날짜</label><input type="date" id="expenseDate"></div><div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">취소</button><button class="btn-save" onclick="saveExpense()">저장</button></div></div>
</div><script>
const csrf = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

function doSearch(val) {
    const q = val.toLowerCase();
    document.querySelectorAll('tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}

function openCreate() {
    document.getElementById('expenseType').value = '';
    document.getElementById('amount').value = '';
    document.getElementById('expenseDate').value = '';
    document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function saveExpense() {
    const data = {
        expenseType: document.getElementById('expenseType').value,
        amount: document.getElementById('amount').value,
        expenseDate: document.getElementById('expenseDate').value
    };
    fetch('/api/expenses', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => location.reload());
}

const _sort = {col:-1, asc:true};
function sortTable(th, col, type) {
    document.querySelectorAll('.sort-th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    _sort.asc = _sort.col === col ? !_sort.asc : true;
    _sort.col = col;
    th.classList.add(_sort.asc ? 'sort-asc' : 'sort-desc');
    const tbody = document.querySelector('tbody');
    const rows = Array.from(tbody.querySelectorAll('tr')).filter(tr => tr.querySelectorAll('td').length > 1);
    rows.sort((a, b) => {
        const va = a.querySelectorAll('td')[col].textContent.trim();
        const vb = b.querySelectorAll('td')[col].textContent.trim();
        const cmp = type === 'num' ? (parseFloat(va.replace(/,/g,''))||0) - (parseFloat(vb.replace(/,/g,''))||0) : va.localeCompare(vb, 'ko');
        return _sort.asc ? cmp : -cmp;
    });
    rows.forEach(r => tbody.appendChild(r));
}

</script>
</body>
</html>
