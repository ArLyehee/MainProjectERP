<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 개발팬 ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
            --accent: #4f8ef7; --text: #e8eaf0; --text-muted: #6b7280;
            --danger: #ef4444; --success: #22c55e;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'IBM Plex Sans KR', sans-serif;
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }
        body::after {
            content: ''; position: fixed; top: -20%; left: 50%;
            transform: translateX(-50%); width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(79,142,247,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .login-wrap { width: 100%; max-width: 420px; padding: 20px; position: relative; z-index: 1; animation: fadeUp 0.5s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
        .logo-area { text-align: center; margin-bottom: 36px; }
        .logo-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border-radius: 14px; display: inline-flex;
            align-items: center; justify-content: center;
            font-size: 24px; margin-bottom: 16px;
            box-shadow: 0 0 30px rgba(79,142,247,0.3);
        }
        .logo-title { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
        .logo-sub { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; }
        .card-header { margin-bottom: 28px; }
        .card-header h2 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .card-header p { font-size: 13px; color: var(--text-muted); }
        .alert { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #86efac; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'IBM Plex Sans KR', sans-serif; font-size: 14px; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.15); }
        input::placeholder { color: var(--text-muted); }
        .btn-login { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: 'IBM Plex Sans KR', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s, transform 0.1s, box-shadow 0.2s; letter-spacing: 0.3px; }
        .btn-login:hover { background: #3b7de8; box-shadow: 0 4px 20px rgba(79,142,247,0.35); }
        .btn-login:active { transform: scale(0.98); }
        .footer-note { text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-muted); }
        .footer-note span { font-family: 'IBM Plex Mono', monospace; color: var(--accent); }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="logo-area">
        <div class="logo-icon">🌬️</div>
        <div class="logo-title">GAEBALFAN</div>
        <div class="logo-sub">개발환기좀시키자 ERP 시스템</div>
    </div>
    <div class="card">
        <div class="card-header">
            <h2>로그인</h2>
            <p>관리자로부터 부여받은 계정으로 로그인하세요.</p>
        </div>
        <div th:if="${errorMsg}" class="alert alert-error">
            ⚠️ <span th:text="${errorMsg}"></span>
        </div>
        <div th:if="${logoutMsg}" class="alert alert-success">
            ✓ <span th:text="${logoutMsg}"></span>
        </div>
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="로그인 ID를 입력하세요" autofocus required/>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required/>
            </div>
            <button type="submit" class="btn-login">로그인</button>
        </form>
    </div>
    <div class="footer-note">
        <span>GAEBALFAN ERP</span> &nbsp;·&nbsp; 계정 문의는 관리자에게 연락하세요
    </div>
</div>
</body>
</html>
