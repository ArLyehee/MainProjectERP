<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>재고 현황 | 개발팬 ERP</title>
    <link rel="stylesheet" th:href="@{/css/erp.css(v=4)}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('inventory')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>📦 재고 현황</h2>
                <p>창고별 제품 재고를 확인합니다.</p>
            </div>
            <button onclick="openCreate()" class="btn btn-primary">+ 재고 등록</button>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="제품명 또는 창고 검색..." oninput="filterTable()" class="search-input">
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>제품명</th>
                        <th>창고</th>
                        <th>수량</th>
                        <th>상태</th>
                        <th>최종 수정</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody id="inventoryTableBody">
                    <tr th:if="${#lists.isEmpty(inventoryList)}">
                        <td colspan="7" class="empty-state">등록된 재고가 없습니다.</td>
                    </tr>
                    <tr th:each="inv : ${inventoryList}">
                        <td th:text="${inv.inventoryId}"></td>
                        <td th:text="${inv.productName != null ? inv.productName : inv.productId}"></td>
                        <td th:text="${inv.warehouseName != null ? inv.warehouseName : inv.warehouseId}"></td>
                        <td class="qty" th:text="${inv.quantity}"></td>
                        <td>
                            <span th:if="${inv.quantity == 0}" class="badge badge-empty">재고없음</span>
                            <span th:if="${inv.quantity > 0 and inv.quantity < 10}" class="badge badge-low">부족</span>
                            <span th:if="${inv.quantity >= 10}" class="badge badge-ok">정상</span>
                        </td>
                        <td th:text="${inv.lastUpdate}"></td>
                        <td>
                            <button class="btn-action btn-edit" th:onclick="|openEdit(${inv.inventoryId})|">수정</button>
                            <button class="btn-action btn-del"  th:onclick="|confirmDelete(${inv.inventoryId})|">삭제</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- 재고 등록 모달 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">재고 등록</h3>
        <input type="hidden" id="inventoryId">
        <div class="form-group">
            <label>제품 *</label>
            <select id="invProductId">
                <option value="">제품 선택</option>
                <option th:each="p : ${productList}" th:value="${p.productId}" th:text="${p.productName}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>창고 *</label>
            <select id="invWarehouseId">
                <option value="">창고 선택</option>
                <option th:each="w : ${warehouseList}" th:value="${w.warehouseId}" th:text="${w.warehouseName}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>수량 *</label>
            <input type="number" id="invQuantity" placeholder="수량 입력" min="0">
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="saveInventory()">저장</button>
        </div>
    </div>
</div>

<script>
const CSRF_TOKEN  = document.querySelector('meta[name="_csrf"]')?.content;
const CSRF_HEADER = document.querySelector('meta[name="_csrf_header"]')?.content;

function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#inventoryTableBody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}

function openCreate() {
    document.getElementById('modalTitle').textContent = '재고 등록';
    document.getElementById('inventoryId').value = '';
    document.getElementById('invProductId').value = '';
    document.getElementById('invWarehouseId').value = '';
    document.getElementById('invQuantity').value = '';
    document.getElementById('modalOverlay').classList.add('open');
}

function openEdit(id) {
    fetch('/api/inventory/' + id)
        .then(r => r.json())
        .then(d => {
            document.getElementById('modalTitle').textContent = '재고 수정';
            document.getElementById('inventoryId').value = d.inventoryId;
            document.getElementById('invProductId').value = d.productId;
            document.getElementById('invWarehouseId').value = d.warehouseId;
            document.getElementById('invQuantity').value = d.quantity;
            document.getElementById('modalOverlay').classList.add('open');
        });
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

function saveInventory() {
    const id = document.getElementById('inventoryId').value;
    const body = {
        productId:   document.getElementById('invProductId').value,
        warehouseId: document.getElementById('invWarehouseId').value,
        quantity:    document.getElementById('invQuantity').value
    };
    const url    = id ? '/api/inventory/' + id : '/api/inventory';
    const method = id ? 'PUT' : 'POST';
    fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', [CSRF_HEADER]: CSRF_TOKEN },
        body: JSON.stringify(body)
    }).then(r => { if (r.ok) location.reload(); });
}

function confirmDelete(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    fetch('/api/inventory/' + id, {
        method: 'DELETE',
        headers: { [CSRF_HEADER]: CSRF_TOKEN }
    }).then(r => { if (r.ok) location.reload(); });
}
</script>
</body>
</html>
