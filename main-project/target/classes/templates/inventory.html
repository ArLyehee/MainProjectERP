<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>재고 현황 | 개발팬 ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#4f8ef7; --text:#e8eaf0; --text-muted:#6b7280; --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; }
        body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans KR',sans-serif; min-height:100vh; }
        .layout { display:flex; min-height:100vh; }
        .sidebar { width:220px; background:var(--surface); border-right:1px solid var(--border); padding:24px 0; flex-shrink:0; }
        .sidebar-logo { padding:0 20px 24px; border-bottom:1px solid var(--border); margin-bottom:16px; }
        .sidebar-logo h1 { font-size:14px; color:var(--accent); font-weight:600; }
        .nav-section { padding:8px 12px; font-size:11px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-top:12px; }
        .nav-item { display:block; padding:9px 20px; font-size:13px; color:var(--text-muted); text-decoration:none; transition:all .2s; border-left:2px solid transparent; }
        .nav-item:hover, .nav-item.active { color:var(--text); background:rgba(79,142,247,.07); border-left-color:var(--accent); }
        .main { flex:1; padding:32px; overflow-x:auto; }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
        .page-title h2 { font-size:20px; font-weight:600; }
        .page-title p { font-size:13px; color:var(--text-muted); margin-top:4px; }
        .btn { padding:9px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#3b7de8; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { padding:12px 16px; text-align:left; font-size:11px; font-weight:500; color:var(--text-muted); letter-spacing:.8px; text-transform:uppercase; border-bottom:1px solid var(--border); background:rgba(0,0,0,.2); }
        td { padding:13px 16px; border-bottom:1px solid rgba(42,45,58,.5); color:var(--text); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(79,142,247,.04); }
        .badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; }
        .badge-ok { background:rgba(34,197,94,.15); color:#4ade80; }
        .badge-low { background:rgba(245,158,11,.15); color:#fbbf24; }
        .badge-empty { background:rgba(239,68,68,.15); color:#f87171; }
        .qty { font-weight:600; font-size:14px; }
        .empty-state { text-align:center; padding:60px; color:var(--text-muted); }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-logo"><h1>🌀 개발팬 ERP</h1></div>
        <div class="nav-section">메인</div>
        <a href="/dashboard" class="nav-item">📊 대시보드</a>
        <div class="nav-section">재고/물류</div>
        <a href="/inventory" class="nav-item active">📦 재고 현황</a>
        <a href="/purchase-orders" class="nav-item">📋 발주 관리</a>
        <a href="/receipts" class="nav-item">📥 입고 관리</a>
        <a href="/shipments" class="nav-item">📤 출고 관리</a>
        <div class="nav-section">기준정보</div>
        <a href="/products" class="nav-item">🔧 제품 관리</a>
        <a href="/suppliers" class="nav-item">🏭 공급업체</a>
        <a href="/warehouses" class="nav-item">🏢 창고 관리</a>
        <div class="nav-section">인사</div>
        <a href="/employees" class="nav-item">👤 직원 관리</a>
        <div class="nav-section">생산</div>
        <a href="/work-orders" class="nav-item">⚙️ 작업지시</a>
    </aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>📦 재고 현황</h2>
                <p>창고별 제품 재고를 확인합니다.</p>
            </div>
            <a href="/inventory/new" class="btn btn-primary">+ 재고 등록</a>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>제품명</th>
                        <th>창고</th>
                        <th>수량</th>
                        <th>상태</th>
                        <th>최종 수정</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(inventoryList)}">
                        <td colspan="6" class="empty-state">등록된 재고가 없습니다.</td>
                    </tr>
                    <tr th:each="inv : ${inventoryList}">
                        <td th:text="${inv.inventoryId}"></td>
                        <td th:text="${inv.productName != null ? inv.productName : inv.productId}"></td>
                        <td th:text="${inv.warehouseName != null ? inv.warehouseName : inv.warehouseId}"></td>
                        <td class="qty" th:text="${inv.quantity}"></td>
                        <td>
                            <span th:if="${inv.quantity == 0}" class="badge badge-empty">재고없음</span>
                            <span th:if="${inv.quantity > 0 and inv.quantity < 10}" class="badge badge-low">부족</span>
                            <span th:if="${inv.quantity >= 10}" class="badge badge-ok">정상</span>
                        </td>
                        <td th:text="${inv.lastUpdate}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
</body>
</html>
