<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>시스템 설정 | 개발팬 ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#4f8ef7; --text:#e8eaf0; --text-muted:#6b7280; --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; }
        body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans KR',sans-serif; min-height:100vh; }
        .layout { display:flex; min-height:100vh; }
        :root { --sidebar-w:220px; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto; }
        .sidebar-logo { padding:20px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .sidebar-logo .s-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
        .sidebar-logo .brand { font-size:13px; font-weight:600; line-height:1.3; }
        .sidebar-logo .brand small { display:block; font-size:10px; color:var(--accent); letter-spacing:1px; font-weight:400; }
        .nav-section { padding:14px 12px 5px; font-size:10px; letter-spacing:1.5px; color:var(--text-muted); text-transform:uppercase; }
        .nav-item { display:flex; align-items:center; gap:9px; padding:9px 12px; margin:2px 8px; border-radius:7px; font-size:13px; color:var(--text-muted); text-decoration:none; transition:background .15s,color .15s; }
        .nav-item:hover { background:rgba(79,142,247,.08); color:var(--text); }
        .nav-item.active { background:rgba(79,142,247,.15); color:var(--accent); font-weight:500; }
        .ni { font-size:15px; width:20px; text-align:center; }
        .sidebar-bottom { margin-top:auto; padding:14px; border-top:1px solid var(--border); }
        .user-info { display:flex; align-items:center; gap:9px; padding:8px; border-radius:7px; }
        .avatar { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; color:#fff; }
        .user-meta { flex:1; min-width:0; }
        .uname { font-size:12px; font-weight:500; }
        .urole { font-size:10px; color:var(--accent); letter-spacing:.5px; }
        .btn-logout { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px; padding:3px; border-radius:4px; transition:color .15s; }
        .btn-logout:hover { color:#ef4444; }
        .main { flex:1; padding:32px; overflow-x:auto; margin-left:var(--sidebar-w); }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
        .page-title h2 { font-size:20px; font-weight:600; }
        .page-title p { font-size:13px; color:var(--text-muted); margin-top:4px; }
        .btn { padding:9px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#3b7de8; }
        .settings-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
        @media (max-width:1100px) { .settings-grid { grid-template-columns:1fr 1fr; } }
        @media (max-width:700px)  { .settings-grid { grid-template-columns:1fr; } }
        .settings-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; }
        .card-title { font-size:14px; font-weight:600; margin-bottom:18px; }
        .form-group { margin-bottom:12px; }
        .form-group label { display:block; font-size:12px; color:#6b7280; margin-bottom:5px; }
        .form-group input { width:100%; padding:9px 12px; background:#0f1117; border:1px solid #2a2d3a; border-radius:7px; color:#e8eaf0; font-size:13px; font-family:inherit; outline:none; }
        .form-group input:focus { border-color:#4f8ef7; }
        .settings-input { flex:1; padding:9px 12px; background:#0f1117; border:1px solid #2a2d3a; border-radius:7px; color:#e8eaf0; font-size:13px; font-family:inherit; outline:none; }
        .settings-input:focus { border-color:#4f8ef7; }
        .item-list { list-style:none; padding:0; margin:0; max-height:200px; overflow-y:auto; }
        .item-list li { display:flex; justify-content:space-between; align-items:center; padding:8px 4px; border-bottom:1px solid var(--border); font-size:13px; }
        .item-list li:last-child { border-bottom:none; }
        .btn-del-sm { background:rgba(239,68,68,.15); color:#ef4444; border:none; border-radius:5px; padding:3px 8px; cursor:pointer; font-size:11px; }
        .btn-del-sm:hover { background:rgba(239,68,68,.3); }
        .msg-success { color:#4ade80; }
        .msg-error { color:#f87171; }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('admin-settings')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>⚙️ 시스템 설정</h2>
                <p>시스템 설정 및 마스터 데이터를 관리합니다.</p>
            </div>
        </div>
        <div class="settings-grid">
            <!-- 비밀번호 변경 -->
            <div class="settings-card">
                <div class="card-title">🔐 비밀번호 변경</div>
                <div class="form-group"><label>현재 비밀번호</label><input type="password" id="oldPassword"></div>
                <div class="form-group"><label>새 비밀번호</label><input type="password" id="newPassword"></div>
                <div class="form-group"><label>새 비밀번호 확인</label><input type="password" id="confirmPassword"></div>
                <div id="pwMsg" style="font-size:12px;margin-bottom:10px;"></div>
                <button class="btn btn-primary" onclick="changePassword()">변경</button>
            </div>
            <!-- 부서 관리 -->
            <div class="settings-card">
                <div class="card-title">🏢 부서 관리</div>
                <ul id="deptList" class="item-list"></ul>
                <div style="display:flex;gap:8px;margin-top:12px;">
                    <input type="text" id="newDept" placeholder="새 부서명" class="settings-input">
                    <button class="btn btn-primary" onclick="addDept()">추가</button>
                </div>
            </div>
            <!-- 직급 관리 -->
            <div class="settings-card">
                <div class="card-title">👤 직급 관리</div>
                <ul id="posList" class="item-list"></ul>
                <div style="display:flex;gap:8px;margin-top:12px;">
                    <input type="text" id="newPos" placeholder="새 직급명" class="settings-input">
                    <button class="btn btn-primary" onclick="addPos()">추가</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
const csrf = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

// 비밀번호 변경
function changePassword() {
    const oldPw = document.getElementById('oldPassword').value;
    const newPw = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    const msg = document.getElementById('pwMsg');
    if (newPw !== confirm) { msg.className='msg-error'; msg.textContent='새 비밀번호가 일치하지 않습니다.'; return; }
    if (newPw.length < 4) { msg.className='msg-error'; msg.textContent='비밀번호는 4자 이상이어야 합니다.'; return; }
    fetch('/api/settings/change-password', {
        method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf},
        body: JSON.stringify({oldPassword: oldPw, newPassword: newPw})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { msg.className='msg-error'; msg.textContent=data.error; }
        else { msg.className='msg-success'; msg.textContent=data.message; document.getElementById('oldPassword').value=''; document.getElementById('newPassword').value=''; document.getElementById('confirmPassword').value=''; }
    });
}

// 부서 로드
function loadDepts() {
    fetch('/api/settings/departments').then(r=>r.json()).then(list => {
        document.getElementById('deptList').innerHTML = list.map(d =>
            `<li>${d.departmentName}<button class="btn-del-sm" onclick="delDept(${d.departmentId})">삭제</button></li>`
        ).join('') || '<li style="color:#6b7280">등록된 부서 없음</li>';
    });
}
function addDept() {
    const name = document.getElementById('newDept').value.trim();
    if (!name) return;
    fetch('/api/settings/departments', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify({departmentName:name}) })
        .then(() => { document.getElementById('newDept').value=''; loadDepts(); });
}
function delDept(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    fetch('/api/settings/departments/' + id, { method:'DELETE', headers:{[csrfHeader]:csrf} })
        .then(() => loadDepts());
}

// 직급 로드
function loadPos() {
    fetch('/api/settings/positions').then(r=>r.json()).then(list => {
        document.getElementById('posList').innerHTML = list.map(p =>
            `<li>${p.positionName}<button class="btn-del-sm" onclick="delPos(${p.positionId})">삭제</button></li>`
        ).join('') || '<li style="color:#6b7280">등록된 직급 없음</li>';
    });
}
function addPos() {
    const name = document.getElementById('newPos').value.trim();
    if (!name) return;
    fetch('/api/settings/positions', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify({positionName:name}) })
        .then(() => { document.getElementById('newPos').value=''; loadPos(); });
}
function delPos(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    fetch('/api/settings/positions/' + id, { method:'DELETE', headers:{[csrfHeader]:csrf} })
        .then(() => loadPos());
}

document.addEventListener('DOMContentLoaded', () => { loadDepts(); loadPos(); });
</script>
</body>
</html>
