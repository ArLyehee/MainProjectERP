<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>사용자 관리 | 개발팬 ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#4f8ef7; --text:#e8eaf0; --text-muted:#6b7280; --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; }
        body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans KR',sans-serif; min-height:100vh; }
        .layout { display:flex; min-height:100vh; }
        :root { --sidebar-w:220px; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto; }
        .sidebar-logo { padding:20px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .sidebar-logo .s-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
        .sidebar-logo .brand { font-size:13px; font-weight:600; line-height:1.3; }
        .sidebar-logo .brand small { display:block; font-size:10px; color:var(--accent); letter-spacing:1px; font-weight:400; }
        .nav-section { padding:14px 12px 5px; font-size:10px; letter-spacing:1.5px; color:var(--text-muted); text-transform:uppercase; }
        .nav-item { display:flex; align-items:center; gap:9px; padding:9px 12px; margin:2px 8px; border-radius:7px; font-size:13px; color:var(--text-muted); text-decoration:none; transition:background .15s,color .15s; }
        .nav-item:hover { background:rgba(79,142,247,.08); color:var(--text); }
        .nav-item.active { background:rgba(79,142,247,.15); color:var(--accent); font-weight:500; }
        .ni { font-size:15px; width:20px; text-align:center; }
        .sidebar-bottom { margin-top:auto; padding:14px; border-top:1px solid var(--border); }
        .user-info { display:flex; align-items:center; gap:9px; padding:8px; border-radius:7px; }
        .avatar { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; color:#fff; }
        .user-meta { flex:1; min-width:0; }
        .uname { font-size:12px; font-weight:500; }
        .urole { font-size:10px; color:var(--accent); letter-spacing:.5px; }
        .btn-logout { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px; padding:3px; border-radius:4px; transition:color .15s; }
        .btn-logout:hover { color:#ef4444; }
        .main { flex:1; padding:32px; overflow-x:auto; margin-left:var(--sidebar-w); }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
        .page-title h2 { font-size:20px; font-weight:600; }
        .page-title p { font-size:13px; color:var(--text-muted); margin-top:4px; }
        .btn { padding:9px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#3b7de8; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { padding:12px 16px; text-align:left; font-size:11px; font-weight:500; color:var(--text-muted); letter-spacing:.8px; text-transform:uppercase; border-bottom:1px solid var(--border); background:rgba(0,0,0,.2); }
        td { padding:13px 16px; border-bottom:1px solid rgba(42,45,58,.5); color:var(--text); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(79,142,247,.04); }
        .empty-state { text-align:center; padding:60px; color:var(--text-muted); }
        .badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; }
        .badge-active { background:rgba(34,197,94,.15); color:#4ade80; }
        .badge-inactive { background:rgba(107,114,128,.15); color:#9ca3af; }
        .sub-text { font-size:12px; color:var(--text-muted); }
        .btn-action { padding:4px 10px; border-radius:5px; border:none; cursor:pointer; font-size:12px; font-family:inherit; }
        .btn-toggle { background:rgba(245,158,11,.15); color:#fbbf24; }
        .btn-toggle:hover { background:rgba(245,158,11,.3); }
        .btn-edit { background:rgba(79,142,247,.15); color:#4f8ef7; }
        .btn-edit:hover { background:rgba(79,142,247,.3); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:#1a1d27; border:1px solid #2a2d3a; border-radius:12px; padding:28px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto; }
        .modal h3 { font-size:16px; font-weight:600; margin-bottom:20px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:12px; color:#6b7280; margin-bottom:6px; }
        .form-group input, .form-group select { width:100%; padding:9px 12px; background:#0f1117; border:1px solid #2a2d3a; border-radius:7px; color:#e8eaf0; font-size:13px; font-family:inherit; outline:none; }
        .form-group input:focus, .form-group select:focus { border-color:#4f8ef7; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
        .btn-cancel { padding:8px 16px; border-radius:7px; border:1px solid #2a2d3a; background:transparent; color:#6b7280; cursor:pointer; font-size:13px; font-family:inherit; }
        .btn-cancel:hover { color:#e8eaf0; }
        .btn-save { padding:8px 16px; border-radius:7px; border:none; background:#4f8ef7; color:#fff; cursor:pointer; font-size:13px; font-family:inherit; font-weight:500; }
        .btn-save:hover { background:#3b7de8; }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('admin-users')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>👥 사용자 관리</h2>
                <p>시스템 사용자 계정을 조회하고 관리합니다.</p>
            </div>
            <button onclick="openCreate()" class="btn btn-primary" sec:authorize="hasRole('ADMIN')">+ 사용자 등록</button>
        </div>
        <div id="userTableArea">
            <div class="card">
                <table id="userTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>사용자명</th>
                            <th>이름</th>
                            <th>역할</th>
                            <th>부서</th>
                            <th>상태</th>
                            <th>액션</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="7" class="empty-state">로딩 중...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- 사용자 등록 모달 -->
<div class="modal-overlay" id="modalOverlay" sec:authorize="hasRole('ADMIN')">
    <div class="modal">
        <h3>사용자 등록</h3>
        <div class="form-row">
            <div class="form-group"><label>사용자명 *</label><input type="text" id="uUsername" placeholder="로그인 ID"></div>
            <div class="form-group"><label>비밀번호 *</label><input type="password" id="uPassword" placeholder="비밀번호"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>이름</label><input type="text" id="uName" placeholder="실명"></div>
            <div class="form-group"><label>이메일</label><input type="email" id="uEmail" placeholder="이메일 주소"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>전화번호</label><input type="text" id="uPhone" placeholder="전화번호"></div>
            <div class="form-group"><label>부서</label><input type="text" id="uDepartment" placeholder="부서명"></div>
        </div>
        <div class="form-group">
            <label>역할</label>
            <select id="uRole">
                <option value="EMPLOYEE">EMPLOYEE</option>
                <option value="MANAGER">MANAGER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="createUser()">등록</button>
        </div>
    </div>
</div>

<!-- 사용자 수정 모달 -->
<div class="modal-overlay" id="editModalOverlay">
    <div class="modal">
        <h3>사용자 수정</h3>
        <input type="hidden" id="editUserId">
        <div class="form-row">
            <div class="form-group"><label>이름</label><input type="text" id="editName" placeholder="실명"></div>
            <div class="form-group"><label>이메일</label><input type="email" id="editEmail" placeholder="이메일 주소"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>전화번호</label><input type="text" id="editPhone" placeholder="전화번호"></div>
            <div class="form-group"><label>부서</label><input type="text" id="editDepartment" placeholder="부서명"></div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>역할</label>
                <select id="editRole">
                    <option value="EMPLOYEE">EMPLOYEE</option>
                    <option value="MANAGER">MANAGER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div class="form-group"><label>새 비밀번호 (선택)</label><input type="password" id="editPassword" placeholder="변경 시에만 입력"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeEditModal()">취소</button>
            <button class="btn-save" onclick="updateUser()">저장</button>
        </div>
    </div>
</div>

<script>
const csrf = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

function loadUsers() {
    fetch('/api/admin/users')
        .then(r => r.json())
        .then(users => {
            const tbody = document.getElementById('userTableBody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">등록된 사용자가 없습니다.</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `<tr>
                <td>${u.userId || u.id || '-'}</td>
                <td>${u.username || '-'}</td>
                <td>${u.name || '-'}</td>
                <td>${u.role || '-'}</td>
                <td>${u.department || '-'}</td>
                <td><span class="badge ${u.status === 'ACTIVE' ? 'badge-active' : 'badge-inactive'}">${u.status || '-'}</span></td>
                <td>
                    <button class="btn-action btn-edit" onclick="openEdit(${u.userId})">수정</button>
                    <button class="btn-action btn-toggle" style="margin-left:4px" onclick="toggleStatus(${u.userId || u.id}, '${u.status}')">
                        ${u.status === 'ACTIVE' ? '비활성화' : '활성화'}
                    </button>
                </td>
            </tr>`).join('');
        })
        .catch(() => {
            document.getElementById('userTableBody').innerHTML = '<tr><td colspan="7" class="empty-state">데이터를 불러올 수 없습니다.</td></tr>';
        });
}

function openCreate() { document.getElementById('modalOverlay').classList.add('open'); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function createUser() {
    const data = {
        username: document.getElementById('uUsername').value,
        password: document.getElementById('uPassword').value,
        name: document.getElementById('uName').value,
        email: document.getElementById('uEmail').value,
        phone: document.getElementById('uPhone').value,
        department: document.getElementById('uDepartment').value,
        role: document.getElementById('uRole').value
    };
    fetch('/api/admin/users', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => { closeModal(); loadUsers(); });
}

function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus === 'ACTIVE' ? 'INACTIVE' : 'ACTIVE';
    fetch('/api/admin/users/' + id + '/status', { method:'PATCH', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify({status: newStatus}) })
        .then(() => loadUsers());
}

document.addEventListener('DOMContentLoaded', loadUsers);

function openEdit(id) {
    fetch('/api/admin/users/' + id)
        .then(r => r.json())
        .then(u => {
            document.getElementById('editUserId').value = u.userId;
            document.getElementById('editName').value = u.name || '';
            document.getElementById('editEmail').value = u.email || '';
            document.getElementById('editPhone').value = u.phone || '';
            document.getElementById('editDepartment').value = u.department || '';
            document.getElementById('editRole').value = u.role || 'EMPLOYEE';
            document.getElementById('editPassword').value = '';
            document.getElementById('editModalOverlay').classList.add('open');
        });
}
function closeEditModal() { document.getElementById('editModalOverlay').classList.remove('open'); }
function updateUser() {
    const id = document.getElementById('editUserId').value;
    const data = {
        name: document.getElementById('editName').value,
        email: document.getElementById('editEmail').value,
        phone: document.getElementById('editPhone').value,
        department: document.getElementById('editDepartment').value,
        role: document.getElementById('editRole').value,
        password: document.getElementById('editPassword').value
    };
    fetch('/api/admin/users/' + id, { method:'PUT', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => { closeEditModal(); loadUsers(); });
}
</script>
</body>
</html>
