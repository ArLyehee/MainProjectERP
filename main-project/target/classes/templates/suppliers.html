<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>공급업체 관리 | 개발팬 ERP</title>
    <link rel="stylesheet" th:href="@{/css/erp.css(v=4)}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('suppliers')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>🏭 공급업체 관리</h2>
                <p>부품 및 원자재 공급업체를 관리합니다.</p>
            </div>
            <button onclick="openCreate()" class="btn btn-primary">+ 공급업체 등록</button>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="검색..." oninput="filterTable()" class="search-input">
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>업체명</th>
                        <th>연락처</th>
                        <th>주소</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(supplierList)}">
                        <td colspan="5" class="empty-state">등록된 공급업체가 없습니다.</td>
                    </tr>
                    <tr th:each="s : ${supplierList}">
                        <td th:text="${s.supplierId}"></td>
                        <td th:text="${s.supplierName}"></td>
                        <td class="phone" th:text="${s.phone}"></td>
                        <td class="address" th:text="${s.address}"></td>
                        <td>
                            <button class="btn-action btn-edit" th:onclick="|openEdit(${s.supplierId})|">수정</button>
                            <button class="btn-action btn-del"  th:onclick="|confirmDelete(${s.supplierId})|">삭제</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">공급업체 등록</h3>
        <input type="hidden" id="supplierId">
        <div class="form-group"><label>업체명 *</label><input type="text" id="supplierName" placeholder="업체명 입력"></div>
        <div class="form-group"><label>연락처</label><input type="text" id="phone" placeholder="연락처 입력"></div>
        <div class="form-group"><label>주소</label><input type="text" id="address" placeholder="주소 입력"></div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="saveSupplier()">저장</button>
        </div>
    </div>
</div>

<script>
function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('tbody tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
}
function openCreate() {
    document.getElementById('modalTitle').textContent = '공급업체 등록';
    document.getElementById('supplierId').value = '';
    document.getElementById('supplierName').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('address').value = '';
    document.getElementById('modalOverlay').classList.add('open');
}
function openEdit(id) {
    fetch('/api/suppliers/' + id)
        .then(r => r.json())
        .then(s => {
            document.getElementById('modalTitle').textContent = '공급업체 수정';
            document.getElementById('supplierId').value = s.supplierId;
            document.getElementById('supplierName').value = s.supplierName || '';
            document.getElementById('phone').value = s.phone || '';
            document.getElementById('address').value = s.address || '';
            document.getElementById('modalOverlay').classList.add('open');
        });
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function saveSupplier() {
    const id = document.getElementById('supplierId').value;
    const data = {
        supplierName: document.getElementById('supplierName').value,
        phone: document.getElementById('phone').value,
        address: document.getElementById('address').value
    };
    const url = id ? '/api/suppliers/' + id : '/api/suppliers';
    const method = id ? 'PUT' : 'POST';
    const csrf = document.querySelector('meta[name="_csrf"]').content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
    fetch(url, { method, headers: {'Content-Type':'application/json', [csrfHeader]: csrf}, body: JSON.stringify(data) })
        .then(() => location.reload());
}
function confirmDelete(id) {
    if (confirm('정말 삭제하시겠습니까?')) {
        const csrf = document.querySelector('meta[name="_csrf"]').content;
        const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
        fetch('/api/suppliers/' + id, { method: 'DELETE', headers: {[csrfHeader]: csrf} })
            .then(() => location.reload());
    }
}
</script>
</body>
</html>
