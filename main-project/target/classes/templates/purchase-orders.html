<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>발주 관리 | 개발팬 ERP</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root { --bg:#0f1117; --surface:#1a1d27; --border:#2a2d3a; --accent:#4f8ef7; --text:#e8eaf0; --text-muted:#6b7280; --success:#22c55e; --danger:#ef4444; --warning:#f59e0b; }
        body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans KR',sans-serif; min-height:100vh; }
        .layout { display:flex; min-height:100vh; }
        :root { --sidebar-w:220px; }
        .sidebar { width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; overflow-y:auto; }
        .sidebar-logo { padding:20px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
        .sidebar-logo .s-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
        .sidebar-logo .brand { font-size:13px; font-weight:600; line-height:1.3; }
        .sidebar-logo .brand small { display:block; font-size:10px; color:var(--accent); letter-spacing:1px; font-weight:400; }
        .nav-section { padding:14px 12px 5px; font-size:10px; letter-spacing:1.5px; color:var(--text-muted); text-transform:uppercase; }
        .nav-item { display:flex; align-items:center; gap:9px; padding:9px 12px; margin:2px 8px; border-radius:7px; font-size:13px; color:var(--text-muted); text-decoration:none; transition:background .15s,color .15s; }
        .nav-item:hover { background:rgba(79,142,247,.08); color:var(--text); }
        .nav-item.active { background:rgba(79,142,247,.15); color:var(--accent); font-weight:500; }
        .ni { font-size:15px; width:20px; text-align:center; }
        .sidebar-bottom { margin-top:auto; padding:14px; border-top:1px solid var(--border); }
        .user-info { display:flex; align-items:center; gap:9px; padding:8px; border-radius:7px; }
        .avatar { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),#7c3aed); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; color:#fff; }
        .user-meta { flex:1; min-width:0; }
        .uname { font-size:12px; font-weight:500; }
        .urole { font-size:10px; color:var(--accent); letter-spacing:.5px; }
        .btn-logout { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px; padding:3px; border-radius:4px; transition:color .15s; }
        .btn-logout:hover { color:#ef4444; }
        .main { flex:1; padding:32px; overflow-x:auto; margin-left:var(--sidebar-w); }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
        .page-title h2 { font-size:20px; font-weight:600; }
        .page-title p { font-size:13px; color:var(--text-muted); margin-top:4px; }
        .btn { padding:9px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:#3b7de8; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { padding:12px 16px; text-align:left; font-size:11px; font-weight:500; color:var(--text-muted); letter-spacing:.8px; text-transform:uppercase; border-bottom:1px solid var(--border); background:rgba(0,0,0,.2); }
        td { padding:13px 16px; border-bottom:1px solid rgba(42,45,58,.5); }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(79,142,247,.04); }
        .badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; }
        .badge-pending  { background:rgba(245,158,11,.15); color:#fbbf24; }
        .badge-approved { background:rgba(79,142,247,.15); color:#93c5fd; }
        .badge-received { background:rgba(34,197,94,.15); color:#4ade80; }
        .badge-canceled { background:rgba(239,68,68,.15); color:#f87171; }
        .empty-state { text-align:center; padding:60px; color:var(--text-muted); }
        .btn-action { padding:4px 10px; border-radius:5px; border:none; cursor:pointer; font-size:11px; font-family:inherit; font-weight:500; }
        .btn-approve { background:rgba(79,142,247,.15); color:#4f8ef7; }
        .btn-approve:hover { background:rgba(79,142,247,.3); }
        .btn-receive { background:rgba(34,197,94,.15); color:#22c55e; }
        .btn-receive:hover { background:rgba(34,197,94,.3); }
        .btn-cancel-po { background:rgba(239,68,68,.15); color:#ef4444; margin-left:4px; }
        .btn-cancel-po:hover { background:rgba(239,68,68,.3); }
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:#1a1d27; border:1px solid #2a2d3a; border-radius:12px; padding:28px; width:420px; max-width:95vw; }
        .modal h3 { font-size:16px; font-weight:600; margin-bottom:20px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:12px; color:#6b7280; margin-bottom:6px; }
        .form-group input, .form-group select { width:100%; padding:9px 12px; background:#0f1117; border:1px solid #2a2d3a; border-radius:7px; color:#e8eaf0; font-size:13px; font-family:inherit; outline:none; }
        .form-group input:focus, .form-group select:focus { border-color:#4f8ef7; }
        .modal-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }
        .btn-cancel-modal { padding:8px 16px; border-radius:7px; border:1px solid #2a2d3a; background:transparent; color:#6b7280; cursor:pointer; font-size:13px; font-family:inherit; }
        .btn-save { padding:8px 16px; border-radius:7px; border:none; background:#4f8ef7; color:#fff; cursor:pointer; font-size:13px; font-family:inherit; font-weight:500; }
        .btn-save:hover { background:#3b7de8; }
    </style>
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: nav('purchase-orders')}"></aside>
    <main class="main">
        <div class="page-header">
            <div class="page-title">
                <h2>📋 발주 관리</h2>
                <p>공급업체 발주 현황을 관리합니다.</p>
            </div>
            <button onclick="openCreate()" class="btn btn-primary">+ 발주 등록</button>
        </div>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>발주 번호</th>
                        <th>공급업체</th>
                        <th>발주일</th>
                        <th>상태</th>
                        <th>액션</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(purchaseOrderList)}">
                        <td colspan="5" class="empty-state">등록된 발주가 없습니다.</td>
                    </tr>
                    <tr th:each="po : ${purchaseOrderList}">
                        <td th:text="'PO-' + ${po.poId}"></td>
                        <td th:text="${po.supplierName != null ? po.supplierName : po.supplierId}"></td>
                        <td th:text="${po.orderDate}"></td>
                        <td>
                            <span th:class="'badge badge-' + ${#strings.toLowerCase(po.status)}"
                                  th:text="${po.status == 'PENDING' ? '대기' :
                                             po.status == 'APPROVED' ? '승인' :
                                             po.status == 'RECEIVED' ? '입고완료' : '취소'}"></span>
                        </td>
                        <td>
                            <span th:if="${po.status == 'PENDING'}">
                                <button class="btn-action btn-approve" th:onclick="|changePoStatus(${po.poId},'APPROVED')|">승인</button>
                                <button class="btn-action btn-cancel-po" th:onclick="|changePoStatus(${po.poId},'CANCELLED')|">취소</button>
                            </span>
                            <span th:if="${po.status == 'APPROVED'}">
                                <button class="btn-action btn-receive" th:onclick="|openReceiveModal(${po.poId})|">입고처리</button>
                                <button class="btn-action btn-cancel-po" th:onclick="|changePoStatus(${po.poId},'CANCELLED')|">취소</button>
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- 발주 등록 모달 -->
<div class="modal-overlay" id="poModal">
    <div class="modal">
        <h3>발주 등록</h3>
        <div class="form-group">
            <label>공급업체 *</label>
            <select id="poSupplierId">
                <option value="">선택</option>
                <option th:each="s : ${supplierList}" th:value="${s.supplierId}" th:text="${s.supplierName}"></option>
            </select>
        </div>
        <div class="form-group"><label>발주일 *</label><input type="date" id="poOrderDate"></div>
        <div class="modal-footer">
            <button class="btn-cancel-modal" onclick="closePoModal()">취소</button>
            <button class="btn-save" onclick="savePo()">저장</button>
        </div>
    </div>
</div>

<script>
const csrf = document.querySelector('meta[name="_csrf"]').content;
const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
function openCreate() { document.getElementById('poModal').classList.add('open'); }
function closePoModal() { document.getElementById('poModal').classList.remove('open'); }
function savePo() {
    const data = { supplierId: document.getElementById('poSupplierId').value, orderDate: document.getElementById('poOrderDate').value, status: 'PENDING' };
    fetch('/api/purchase-orders', { method:'POST', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify(data) })
        .then(() => location.reload());
}
function changePoStatus(id, status) {
    if (!confirm('상태를 변경하시겠습니까?')) return;
    fetch('/api/purchase-orders/' + id + '/status', { method:'PATCH', headers:{'Content-Type':'application/json',[csrfHeader]:csrf}, body:JSON.stringify({status}) })
        .then(() => location.reload());
}
function openReceiveModal(poId) {
    window.location.href = '/receipts';
}
</script>
</body>
</html>
